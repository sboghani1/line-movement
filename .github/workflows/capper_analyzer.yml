name: Capper Analyzer

on:
  schedule:
    # Run every 15 minutes
    - cron: '*/15 * * * *'
  workflow_dispatch:  # Allow manual trigger

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  fetch-images:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Capper Analyzer
        id: process
        env:
          DISCORD_USER_TOKEN: ${{ secrets.DISCORD_USER_TOKEN }}
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TELEGRAM_SESSION: ${{ secrets.TELEGRAM_SESSION }}
          TELEGRAM_API_ID: ${{ secrets.TELEGRAM_API_ID }}
          TELEGRAM_API_HASH: ${{ secrets.TELEGRAM_API_HASH }}
          TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
        run: |
          # Record origin/main before running (script pushes via detached worktree)
          BEFORE=$(git rev-parse origin/main)
          
          python capper_analyzer.py
          
          # Check if script pushed a new commit
          git fetch origin main
          AFTER=$(git rev-parse origin/main)
          
          if [ "$BEFORE" != "$AFTER" ]; then
            echo "csv_updated=true" >> $GITHUB_OUTPUT
            echo "New commit pushed: $BEFORE → $AFTER"
            # Reset local changes and pull fresh content for deploy
            git checkout -- .
            git pull --ff-only origin main
          else
            echo "csv_updated=false" >> $GITHUB_OUTPUT
            echo "No new commits"
          fi

      - name: Setup Pages
        if: steps.process.outputs.csv_updated == 'true'
        uses: actions/configure-pages@v4

      - name: Inject trigger PAT
        if: steps.process.outputs.csv_updated == 'true'
        run: sed -i "s/__TRIGGER_PAT__/${{ secrets.TRIGGER_PAT }}/g" gh-pages/index.html
      
      - name: Upload artifact
        if: steps.process.outputs.csv_updated == 'true'
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'gh-pages'
      
      - name: Deploy to GitHub Pages
        if: steps.process.outputs.csv_updated == 'true'
        id: deployment
        uses: actions/deploy-pages@v4
