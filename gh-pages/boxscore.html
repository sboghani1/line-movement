  <script type="text/babel">
const { useState, useMemo, useEffect } = React;

const SHEET_ID = '1LzkU7rH3OtrJckV5oMvFHyuLAnbRn9E74FO1uyfM65k';
const TAB = 'nba_schedule';

function sheetCsvUrl(tab, range) {
  let url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(tab)}`;
  if (range) url += `&range=${range}`;
  return url;
}

// ── CSV Parser ──────────────────────────────────────────────────────────────

function* csvRows(text) {
  let current = '';
  let inQuotes = false;
  let row = [];
  for (let i = 0; i < text.length; i++) {
    const ch = text[i];
    if (ch === '"') {
      if (inQuotes && text[i+1] === '"') { current += '"'; i++; }
      else inQuotes = !inQuotes;
    } else if (ch === ',' && !inQuotes) {
      row.push(current); current = '';
    } else if ((ch === '\n' || ch === '\r') && !inQuotes) {
      row.push(current); current = '';
      if (row.some(c => c.length > 0)) yield row;
      row = [];
      if (ch === '\r' && text[i+1] === '\n') i++;
    } else {
      current += ch;
    }
  }
  row.push(current);
  if (row.some(c => c.length > 0)) yield row;
}

function parseSheetCsv(text) {
  const rows = [...csvRows(text)];
  if (rows.length < 2) return [];
  const headers = rows[0].map(h => h.trim().toLowerCase());
  return rows.slice(1).map(r => {
    const obj = {};
    headers.forEach((h, i) => { obj[h] = (r[i] || '').trim(); });
    return obj;
  });
}

// ── Data Parsing ────────────────────────────────────────────────────────────

function parseSpread(spreadStr) {
  // "Cleveland Cavaliers -8.5" -> { favTeam: "Cleveland Cavaliers", line: -8.5 }
  const m = spreadStr.match(/^(.+?)\s+([+-]?\d+\.?\d*)$/);
  if (!m) return { favTeam: '', line: 0 };
  return { favTeam: m[1].trim(), line: parseFloat(m[2]) };
}

function parsePeriodScores(periodStr, awayTeam, homeTeam) {
  // "Away Q1, Home Q1 | Away Q2, Home Q2 | ..."
  if (!periodStr || !periodStr.trim()) return [];
  const quarters = periodStr.split('|').map(q => q.trim());
  return quarters.map(q => {
    // "Toronto Raptors 31, Cleveland Cavaliers 35"
    const parts = q.split(',').map(p => p.trim());
    if (parts.length !== 2) return null;
    const parseScore = (part) => {
      const m = part.match(/(\d+)\s*$/);
      return m ? parseInt(m[1]) : 0;
    };
    // Determine which part is away vs home by team name
    const isFirstAway = parts[0].includes(awayTeam) || !parts[0].includes(homeTeam);
    const away = parseScore(isFirstAway ? parts[0] : parts[1]);
    const home = parseScore(isFirstAway ? parts[1] : parts[0]);
    return { away, home };
  }).filter(Boolean);
}

function parseTags(tagStr) {
  if (!tagStr || !tagStr.trim()) return {};
  const tags = tagStr.split(',').map(t => t.trim());
  const result = {};
  for (const t of tags) {
    const roundMatch = t.match(/^round_(\d+)$/);
    const gameMatch = t.match(/^game_(\d+)$/);
    if (roundMatch) result.round = parseInt(roundMatch[1]);
    if (gameMatch) result.seriesGame = parseInt(gameMatch[1]);
  }
  result.raw = tags;
  return result;
}

const DEFAULT_MARGIN_THRESHOLDS = [4, 9, 16];

function marginBucket(margin, thresholds = DEFAULT_MARGIN_THRESHOLDS) {
  const abs = Math.abs(margin);
  if (abs === 0) return { symbol: '=', label: 'Tie', level: 0 };
  if (abs <= thresholds[0]) return { symbol: '+', label: 'Close', level: 1 };
  if (abs <= thresholds[1]) return { symbol: '++', label: 'Comfortable', level: 2 };
  if (abs <= thresholds[2]) return { symbol: '+++', label: 'Dominant', level: 3 };
  return { symbol: '++++', label: 'Blowout', level: 4 };
}

function parseGame(row) {
  const tags = parseTags(row.tags);
  if (!tags.round) return null; // Not a playoff game

  const spread = parseSpread(row.spread);
  const quarters = parsePeriodScores(row.period_scores, row.away_team, row.home_team);
  const favSide = spread.favTeam === row.home_team ? 'home' : 'away';
  const totalLine = row.over_under ? parseFloat(row.over_under) : null;

  // Build quarter data
  let runAway = 0, runHome = 0;
  const qData = quarters.map((q, i) => {
    runAway += q.away;
    runHome += q.home;
    const margin = q.home - q.away; // positive = home won quarter
    const winner = margin > 0 ? 'home' : margin < 0 ? 'away' : 'tie';
    const favWon = winner === favSide ? 'fav' : winner === 'tie' ? 'tie' : 'dog';
    const qTotal = q.away + q.home;
    const runTotal = runAway + runHome;
    const projectedTotal = totalLine ? Math.round(runTotal / (i + 1) * 4) : null;
    return {
      qNum: i + 1,
      away: q.away,
      home: q.home,
      margin,
      winner,
      favWon,
      bucket: marginBucket(margin),
      runAway,
      runHome,
      runMargin: runHome - runAway, // positive = home leading
      qTotal,
      runTotal,
      projectedTotal,
      totalPace: totalLine ? (runTotal - (totalLine / 4 * (i + 1))) : null, // + means on pace for over
    };
  });

  // Parse final score - format: "Team Name 91, Team Name 123"
  let finalAway = 0, finalHome = 0;
  if (row.score) {
    const scoreParts = row.score.split(',').map(s => s.trim());
    if (scoreParts.length === 2) {
      const parseTeamScore = (part) => {
        const m = part.match(/(\d+)\s*$/);
        return m ? parseInt(m[1]) : 0;
      };
      const score1 = parseTeamScore(scoreParts[0]);
      const score2 = parseTeamScore(scoreParts[1]);
      const isFirstAway = scoreParts[0].includes(row.away_team);
      finalAway = isFirstAway ? score1 : score2;
      finalHome = isFirstAway ? score2 : score1;
    }
  }

  const isLive = quarters.length > 0 && quarters.length < 4 && !row.score;
  const isComplete = quarters.length >= 4 && row.score;
  const isUpcoming = quarters.length === 0 && !row.score;

  return {
    date: row.game_date,
    away: row.away_team,
    home: row.home_team,
    spread: spread.line,
    favTeam: spread.favTeam,
    favSide,
    quarters: qData,
    finalAway,
    finalHome,
    finalMargin: finalHome - finalAway,
    finalTotal: finalAway + finalHome,
    totalLine,
    round: tags.round,
    seriesGame: tags.seriesGame,
    tags: tags.raw,
    isLive,
    isComplete,
    isUpcoming,
  };
}

// ── Pattern Matching ────────────────────────────────────────────────────────

function findSimilarGames(targetGame, allGames, filters) {
  if (!targetGame || targetGame.quarters.length === 0) return [];
  const completedQs = targetGame.quarters.length;

  return allGames.filter(g => {
    if (g === targetGame) return false;
    if (!g.isComplete) return false;
    if (g.quarters.length < completedQs) return false;

    // Match quarter flow pattern
    for (let i = 0; i < completedQs; i++) {
      const tq = targetGame.quarters[i];
      const gq = g.quarters[i];
      if (tq.favWon !== gq.favWon) return false;
    }

    // Spread range filter
    if (filters.spreadRange) {
      const [min, max] = filters.spreadRange;
      const absSpread = Math.abs(g.spread);
      if (absSpread < min || absSpread > max) return false;
    }

    return true;
  });
}

function getNextQuarterStats(similarGames, afterQ) {
  const nextQ = afterQ + 1;
  if (nextQ > 4) return null;

  const gamesWithNextQ = similarGames.filter(g => g.quarters.length >= nextQ);
  if (gamesWithNextQ.length === 0) return null;

  const favWins = gamesWithNextQ.filter(g => g.quarters[nextQ - 1].favWon === 'fav').length;
  const dogWins = gamesWithNextQ.filter(g => g.quarters[nextQ - 1].favWon === 'dog').length;
  const ties = gamesWithNextQ.length - favWins - dogWins;

  return {
    qNum: nextQ,
    total: gamesWithNextQ.length,
    favWins,
    dogWins,
    ties,
    favPct: Math.round(favWins / gamesWithNextQ.length * 100),
    dogPct: Math.round(dogWins / gamesWithNextQ.length * 100),
  };
}

// ── Components ──────────────────────────────────────────────────────────────

const DOG_COLOR = '#FF6B6B';
const TIE_COLOR = '#999';

function QuarterBox({ q, favSide, away, home, isLive, isUpcoming }) {
  if (isUpcoming) {
    return (

        background: 'rgba(255,255,255,0.05)',
        borderRadius: '10px',
        padding: '12px 16px',
        minWidth: '120px',

      }}>
        <div style={{ fontSize: '0.7rem', color: 'rgba(255,255,255,0.3)', fontWeight: '700' }}>Q{q.qNum}</div>
        <div style={{ fontSize: '1.2rem', color: 'rgba(255,255,255,0.2)', marginTop: '4px' }}>???</div>
      </div>
    );
  }

  if (isLive) {
    return (
      <div style={{
        background: 'rgba(255,215,0,0.15)',
        borderRadius: '10px',
        padding: '12px 16px',
        minWidth: '120px',
        textAlign: 'center',
        border: '2px solid rgba(255,215,0,0.5)',
        animation: 'pulse 2s infinite',
      }}>
        <div style={{ fontSize: '0.7rem', color: LIVE_COLOR, fontWeight: '700' }}>Q{q.qNum} LIVE</div>
      </div>
    );
  }

  const winColor = q.favWon === 'fav' ? FAV_COLOR : q.favWon === 'dog' ? DOG_COLOR : TIE_COLOR;
  const runLeader = q.runMargin > 0 ? home : q.runMargin < 0 ? away : null;
  const runLeaderSide = q.runMargin > 0 ? 'home' : 'away';
  const runIsFav = runLeaderSide === favSide;

  return (
    <div style={{
      background: 'rgba(0,33,165,0.3)',
      borderRadius: '10px',
      padding: '12px 16px',
      minWidth: '120px',
      textAlign: 'center',
      border: `2px solid ${winColor}33`,
    }}>
      <div style={{ fontSize: '0.7rem', color: 'rgba(255,255,255,0.5)', fontWeight: '700', marginBottom: '4px' }}>Q{q.qNum}</div>
      <div style={{ display: 'flex', justifyContent: 'space-between', gap: '8px', fontSize: '0.85rem', marginBottom: '6px' }}>
        <span style={{ color: 'rgba(255,255,255,0.6)' }}>{q.away}</span>
        <span style={{ color: 'rgba(255,255,255,0.6)' }}>{q.home}</span>
      </div>
      <div style={{ fontSize: '0.8rem', fontWeight: '700', color: winColor, marginBottom: '2px' }}>
        {q.favWon === 'tie' ? 'TIE' : q.favWon.toUpperCase()} {q.bucket.symbol}
      </div>
      <div style={{ fontSize: '0.65rem', color: 'rgba(255,255,255,0.4)' }}>
        {q.margin === 0 ? 'Even' : (
          <span>
            <span style={{ color: (q.winner === favSide) ? FAV_COLOR : DOG_COLOR }}>
              {q.winner === favSide ? 'Fav' : 'Dog'} +{Math.abs(q.margin)}
            </span>
            {' '}
            <span style={{ color: 'rgba(255,255,255,0.35)' }}>
              ({q.runMargin === 0 ? 'Tied' : `${runIsFav ? 'Fav' : 'Dog'} +${Math.abs(q.runMargin)}`})
            </span>
          </span>
        )}
      </div>
    </div>
  );
}

const OVER_COLOR = '#FF9B3B';
const UNDER_COLOR = '#70AD47';

function TotalQuarterBox({ q, totalLine, isLive, isUpcoming }) {
  if (isUpcoming) {
    return (
      <div style={{
        background: 'rgba(255,255,255,0.05)',
        borderRadius: '10px',
        padding: '10px 16px',
        minWidth: '120px',
        textAlign: 'center',

        <div style={{ fontSize: '1rem', color: 'rgba(255,255,255,0.15)', marginTop: '2px' }}>—</div>
      </div>

  }

  if (isLive) {

      <div style={{
        background: 'rgba(255,215,0,0.1)',

        minWidth: '120px',

      }}>
        <div style={{ fontSize: '0.7rem', color: LIVE_COLOR, fontWeight: '700' }}>Q{q.qNum}</div>
      </div>

  }

  const paceColor = q.totalPace > 0 ? OVER_COLOR : q.totalPace < 0 ? UNDER_COLOR : 'rgba(255,255,255,0.4)';

  return (

      border: `1px solid ${paceColor}33`,
    }}>
      <div style={{ fontSize: '0.7rem', color: 'rgba(255,255,255,0.4)', fontWeight: '700', marginBottom: '2px' }}>Q{q.qNum}</div>
      <div style={{ fontSize: '0.85rem', fontWeight: '700', color: '#fff' }}>{q.qTotal} pts</div>
      <div style={{ fontSize: '0.75rem', fontWeight: '600', color: paceColor }}>
        {q.runTotal} total
      </div>
      {totalLine && (
        <div style={{ fontSize: '0.6rem', color: paceColor, marginTop: '2px' }}>
          {q.totalPace > 0 ? '+' : ''}{q.totalPace.toFixed(1)} pace
        </div>
      )}

}

function Connector() {

    <div style={{
      display: 'flex',
      alignItems: 'center',
      width: '32px',

const ROUND_NAMES = { 1: 'First Round', 2: 'Conference Semis', 3: 'Conference Finals', 4: 'Finals' };

function Collapsible({ title, subtitle, defaultOpen, children, level, onLinkGames, linkCount }) {
  const [open, setOpen] = useState(defaultOpen);
  const bg = level === 0 ? 'rgba(0,33,165,0.35)' : level === 1 ? 'rgba(0,33,165,0.25)' : 'rgba(0,33,165,0.15)';
  const fontSize = level === 0 ? '1.1rem' : level === 1 ? '0.95rem' : '0.85rem';
  const pad = level === 0 ? '16px 20px' : level === 1 ? '12px 16px' : '10px 14px';
  return (
    <div style={{ marginBottom: level === 0 ? '16px' : level === 1 ? '10px' : '6px' }}>
      <button onClick={() => setOpen(!open)} style={{
        width: '100%', textAlign: 'left', padding: pad, background: bg,
        border: '1px solid rgba(255,255,255,0.1)', borderRadius: open ? '12px 12px 0 0' : '12px',
        color: '#fff', fontSize, fontWeight: '700', cursor: 'pointer',
        display: 'flex', justifyContent: 'space-between', alignItems: 'center',
      }}>
        <span>{title} {subtitle && <span style={{ fontWeight: '400', fontSize: '0.8em', color: 'rgba(255,255,255,0.5)' }}>{subtitle}</span>}</span>
        <span style={{ display: 'flex', alignItems: 'center', gap: '10px' }}>
          {onLinkGames && <span onClick={(e) => { e.stopPropagation(); onLinkGames(); }} style={{
            fontSize: '0.7em', fontWeight: '500', padding: '3px 10px', borderRadius: '6px',
            background: 'rgba(90,155,213,0.25)', border: '1px solid rgba(90,155,213,0.5)',
            color: 'rgba(90,155,213,0.9)', cursor: 'pointer',
          }}>Link {linkCount} games</span>}
          <span style={{ fontSize: '0.8em', color: 'rgba(255,255,255,0.4)', transition: 'transform 0.2s', transform: open ? 'rotate(180deg)' : 'rotate(0)' }}>&#9660;</span>
        </span>
      </button>
      {open && (
        <div style={{ padding: level < 2 ? '12px' : '8px', background: 'rgba(0,0,0,0.1)', borderRadius: '0 0 12px 12px', border: '1px solid rgba(255,255,255,0.06)', borderTop: 'none' }}>
          {children}
        </div>
      )}
    </div>
  );
}

function GameCard({ game, allGames, filters, isLinked, onToggleLink, testScores, onUpdateTestScore, onClearTestScores }) {
  const [expanded, setExpanded] = useState(false);
  const [localMlMode, setLocalMlMode] = useState(false);

  const gameKey = `${game.date}|${game.away}|${game.home}`;

  // Build quarter boxes
  const completedQs = game.quarters.length;
  const totalQs = 4;
  const boxes = [];
  for (let i = 0; i < totalQs; i++) {
    if (i < completedQs) {
      boxes.push({ q: game.quarters[i], isLive: false, isUpcoming: false });
    } else if (i === completedQs && game.isLive) {
      boxes.push({ q: { qNum: i + 1 }, isLive: true, isUpcoming: false });
    } else {
      boxes.push({ q: { qNum: i + 1 }, isLive: false, isUpcoming: true });
    }
  }

  // Pattern matching for completed/live games
  const similar = useMemo(() => {
    if (completedQs === 0) return [];
    return findSimilarGames(game, allGames, filters);
  }, [game, allGames, filters]);

  const nextQStats = useMemo(() => {
    if (completedQs === 0 || completedQs >= 4) return null;
    return getNextQuarterStats(similar, completedQs);
  }, [similar, completedQs]);

  // Stats for all remaining quarters
  const remainingQStats = useMemo(() => {
    if (completedQs >= 4) return [];
    const stats = [];
    for (let q = completedQs + 1; q <= 4; q++) {
      const gamesWithQ = similar.filter(g => g.quarters.length >= q);
      if (gamesWithQ.length === 0) continue;
      const favWins = gamesWithQ.filter(g => g.quarters[q - 1].favWon === 'fav').length;
      const dogWins = gamesWithQ.filter(g => g.quarters[q - 1].favWon === 'dog').length;
      stats.push({
        qNum: q,
        total: gamesWithQ.length,
        favWins,
        dogWins,
        favPct: Math.round(favWins / gamesWithQ.length * 100),
        dogPct: Math.round(dogWins / gamesWithQ.length * 100),
      });
    }
    return stats;
  }, [similar, completedQs]);

  const favLabel = game.favSide === 'home' ? game.home : game.away;
  const dogLabel = game.favSide === 'home' ? game.away : game.home;
  const spreadDisplay = Math.abs(game.spread);

  return (
    <div style={{
      background: 'rgba(0,33,165,0.2)',
      borderRadius: '14px',
      padding: '20px',
      border: game.isLive ? '2px solid rgba(255,215,0,0.4)' : isLinked ? '2px solid rgba(90,155,213,0.5)' : '1px solid rgba(255,255,255,0.1)',
      position: 'relative',
    }}>
      {/* Link toggle */}
      <button onClick={() => onToggleLink(gameKey)} style={{
        position: 'absolute',
        top: '8px',
        left: '8px',
        width: '24px',
        height: '24px',
        borderRadius: '6px',
        border: isLinked ? '2px solid rgba(90,155,213,0.7)' : '1px solid rgba(255,255,255,0.25)',
        background: isLinked ? 'rgba(90,155,213,0.3)' : 'rgba(255,255,255,0.07)',
        color: isLinked ? FAV_COLOR : 'rgba(255,255,255,0.4)',
        fontSize: '1rem',
        fontWeight: '700',
        cursor: 'pointer',
        display: 'flex',
        alignItems: 'center',
        justifyContent: 'center',
        lineHeight: 1,
        padding: 0,
      }}>{isLinked ? '−' : '+'}</button>
      {/* Header */}
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', marginBottom: '14px', flexWrap: 'wrap', gap: '8px', marginLeft: '32px' }}>
        <div>
          <div style={{ fontSize: '0.7rem', color: 'rgba(255,255,255,0.4)' }}>
            {game.date} &bull; Round {game.round} Game {game.seriesGame}
            {game.isLive && <span style={{ color: LIVE_COLOR, marginLeft: '8px', fontWeight: '700' }}>LIVE</span>}
          </div>
          <div style={{ fontSize: '1.05rem', fontWeight: '700', color: '#fff', marginTop: '2px' }}>
            {game.away} @ {game.home}
          </div>
          <div style={{ fontSize: '0.8rem', color: 'rgba(255,255,255,0.5)', marginTop: '2px' }}>
            <span style={{ color: FAV_COLOR }}>FAV</span> {favLabel} -{spreadDisplay} &bull; <span style={{ color: DOG_COLOR }}>DOG</span> {dogLabel} +{spreadDisplay}
            {game.totalLine && <span> &bull; O/U {game.totalLine}</span>}
          </div>
          {game.isComplete && (<>
            <div style={{ fontSize: '1.05rem', fontWeight: '800', color: '#fff', marginTop: '4px' }}>
              {game.finalAway} - {game.finalHome}
            </div>
            {game.totalLine && (() => {
              const half = game.totalLine / 2;
              const halfSpread = spreadDisplay / 2;
              const vegasFav = (half + halfSpread).toFixed(1);
              const vegasDog = (half - halfSpread).toFixed(1);
              const vegasAway = game.favSide === 'away' ? vegasFav : vegasDog;
              const vegasHome = game.favSide === 'home' ? vegasFav : vegasDog;
              return (
                <div style={{ fontSize: '1.05rem', fontWeight: '800', color: 'rgba(255,255,255,0.35)' }}>
                  Vegas thot: {vegasAway} - {vegasHome}
                </div>
              );
            })()}
            <div style={{
              fontSize: '0.75rem',
              fontWeight: '700',
              color: (game.finalMargin > 0 ? 'home' : 'away') === game.favSide ? FAV_COLOR : DOG_COLOR,
            }}>
              {(game.finalMargin > 0 ? 'home' : 'away') === game.favSide ? 'FAV' : 'DOG'} wins by {Math.abs(game.finalMargin)}
              {Math.abs(game.finalMargin) > spreadDisplay ? ` (COVERS -${spreadDisplay})` : ` (NO COVER -${spreadDisplay})`}
            </div>
            <div style={{
              fontSize: '0.7rem',
              fontWeight: '600',
              color: game.totalLine
                ? (game.finalTotal > game.totalLine ? '#FF9B3B' : game.finalTotal < game.totalLine ? '#70AD47' : 'rgba(255,255,255,0.5)')
                : 'rgba(255,255,255,0.5)',
            }}>
              Total: {game.finalTotal}{game.totalLine ? ` (${game.finalTotal > game.totalLine ? 'OVER' : game.finalTotal < game.totalLine ? 'UNDER' : 'PUSH'} by ${Math.abs(game.finalTotal - game.totalLine).toFixed(1)})` : ''}
            </div>
          </>)}
        </div>
      </div>

      {/* Quarter Flow Boxes */}
      <div style={{ display: 'flex', alignItems: 'center', overflowX: 'auto', paddingBottom: '8px', WebkitOverflowScrolling: 'touch' }}>
        {boxes.map((b, i) => (
          <React.Fragment key={i}>
            <QuarterBox
              q={b.q}
              favSide={game.favSide}
              away={game.away}
              home={game.home}
              isLive={b.isLive}
              isUpcoming={b.isUpcoming}
            />
            {i < boxes.length - 1 && <Connector />}
          </React.Fragment>
        ))}
      </div>

      {/* Editable Test Scores for incomplete games */}
      {!game.isComplete && onUpdateTestScore && (() => {
        const gk = gameKey;
        const ts = testScores || {};
        const gts = ts[gk] || {};
        const inputStyle = {
          width: '40px', padding: '4px', textAlign: 'center', fontSize: '0.8rem',
          background: 'rgba(255,255,255,0.1)', border: '1px solid rgba(255,255,255,0.25)',
          borderRadius: '4px', color: '#fff', outline: 'none',
        };
        return (
          <div style={{ marginTop: '8px', padding: '10px', background: 'rgba(0,0,0,0.2)', borderRadius: '8px' }}>
            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '8px' }}>
              <span style={{ fontSize: '0.7rem', color: 'rgba(255,255,255,0.5)', fontWeight: '600' }}>TEST SCORES</span>
              {Object.keys(gts).length > 0 && (
                <button onClick={() => onClearTestScores(gk)} style={{
                  fontSize: '0.65rem', padding: '2px 8px', borderRadius: '4px',
                  background: 'rgba(255,80,80,0.2)', border: '1px solid rgba(255,80,80,0.4)',
                  color: 'rgba(255,80,80,0.8)', cursor: 'pointer',
                }}>Clear</button>
              )}
            </div>
            <div style={{ display: 'grid', gridTemplateColumns: 'auto repeat(4, 40px)', gap: '4px 6px', alignItems: 'center', width: 'fit-content' }}>
              <span style={{ fontSize: '0.7rem', color: 'rgba(255,255,255,0.4)' }}></span>
              {[1,2,3,4].map(q => <span key={q} style={{ fontSize: '0.7rem', color: 'rgba(255,255,255,0.4)', textAlign: 'center' }}>Q{q}</span>)}
              <span style={{ fontSize: '0.75rem', color: 'rgba(255,255,255,0.6)' }}>{game.away}</span>
              {[0,1,2,3].map(qi => (
                <input key={`a${qi}`} type="number" style={inputStyle}
                  value={gts[qi]?.away ?? ''} placeholder="-"
                  onChange={(e) => onUpdateTestScore(gk, qi, 'away', e.target.value)} />
              ))}
              <span style={{ fontSize: '0.75rem', color: 'rgba(255,255,255,0.6)' }}>{game.home}</span>
              {[0,1,2,3].map(qi => (
                <input key={`h${qi}`} type="number" style={inputStyle}
                  value={gts[qi]?.home ?? ''} placeholder="-"
                  onChange={(e) => onUpdateTestScore(gk, qi, 'home', e.target.value)} />
              ))}
            </div>
          </div>
        );
      })()}

      {/* Total Quarter Flow Boxes */}
      {game.quarters.length > 0 && (
        <>
          <div style={{ fontSize: '0.7rem', color: 'rgba(255,255,255,0.4)', fontWeight: '600', marginTop: '10px', marginBottom: '6px' }}>
            TOTAL {game.totalLine ? `(O/U ${game.totalLine})` : ''}
          </div>
          <div style={{ display: 'flex', alignItems: 'center', overflowX: 'auto', paddingBottom: '8px', WebkitOverflowScrolling: 'touch' }}>
            {boxes.map((b, i) => (
              <React.Fragment key={`t${i}`}>
                <TotalQuarterBox
                  q={b.q}
                  totalLine={game.totalLine}
                  isLive={b.isLive}
                  isUpcoming={b.isUpcoming}
                />
                {i < boxes.length - 1 && <Connector />}
              </React.Fragment>
            ))}
          </div>
        </>
      )}

      {/* Running Score Line */}
      {game.quarters.length > 0 && (
        <div style={{ marginTop: '10px', fontSize: '0.75rem', color: 'rgba(255,255,255,0.4)', display: 'flex', gap: '8px', flexWrap: 'wrap' }}>
          <span style={{ color: 'rgba(255,255,255,0.5)', fontWeight: '600' }}>Running:</span>
          {game.quarters.map((q, i) => {
            const leader = q.runMargin > 0 ? game.home : q.runMargin < 0 ? game.away : 'Tied';
            const leaderSide = q.runMargin > 0 ? 'home' : 'away';
            const isFav = leaderSide === game.favSide;
            return (
              <span key={i}>
                {q.runMargin === 0 ? 'Tied' : (
                  <span style={{ color: isFav ? FAV_COLOR : DOG_COLOR }}>
                    {isFav ? 'Fav' : 'Dog'} +{Math.abs(q.runMargin)}
                  </span>
                )}
                {i < game.quarters.length - 1 && <span style={{ margin: '0 4px' }}>&rarr;</span>}
              </span>
            );
          })}
        </div>
      )}

      {/* Pattern Matching Results */}
      {(game.isLive || game._hasTestScores || (game.isComplete && expanded)) && similar.length > 0 && (() => {
        // Contextual breakdowns
        const finalStats = (games) => {
          const favWins = games.filter(g => {
            if (localMlMode) {
              // ML: fav wins outright
              const winner = g.finalMargin > 0 ? 'home' : g.finalMargin < 0 ? 'away' : 'tie';
              return winner === g.favSide;
            } else {
              // ATS: fav covers the spread
              const favMargin = g.favSide === 'home' ? g.finalMargin : -g.finalMargin;
              return favMargin > Math.abs(g.spread);
            }
          }).length;
          const dogWins = games.filter(g => {
            if (localMlMode) {
              const winner = g.finalMargin > 0 ? 'home' : g.finalMargin < 0 ? 'away' : 'tie';
              return winner !== g.favSide && winner !== 'tie';
            } else {
              const favMargin = g.favSide === 'home' ? g.finalMargin : -g.finalMargin;
              return favMargin < Math.abs(g.spread);
            }
          }).length;
          return { total: games.length, favWins, dogWins, favPct: games.length ? Math.round(favWins / games.length * 100) : 0, dogPct: games.length ? Math.round(dogWins / games.length * 100) : 0 };
        };

        const byGameNum = {};
        const byRound = {};
        const bySpreadBucket = {};
        for (const g of similar) {
          // By game number
          const gn = g.seriesGame || 0;
          if (!byGameNum[gn]) byGameNum[gn] = [];
          byGameNum[gn].push(g);
          // By round
          const r = g.round || 0;
          if (!byRound[r]) byRound[r] = [];
          byRound[r].push(g);
          // By spread size
          const abs = Math.abs(g.spread);
          const bucket = abs <= 3 ? '1-3' : abs <= 6 ? '3.5-6' : abs <= 9 ? '6.5-9' : '9.5+';
          if (!bySpreadBucket[bucket]) bySpreadBucket[bucket] = [];
          bySpreadBucket[bucket].push(g);
        }

        const ROUND_LABELS = { 1: 'R1', 2: 'Semis', 3: 'Conf Finals', 4: 'Finals' };
        const favVerb = localMlMode ? 'wins' : 'covers';
        const dogVerb = localMlMode ? 'wins' : 'covers';
        const statLine = (label, stats) => (
          <div style={{ display: 'flex', gap: '8px', alignItems: 'center', marginBottom: '2px' }}>
            <span style={{ fontSize: '0.75rem', color: 'rgba(255,255,255,0.5)', minWidth: '70px' }}>{label}</span>
            <span style={{ fontSize: '0.75rem', color: FAV_COLOR, fontWeight: '600' }}>Fav {favVerb} {stats.favWins}/{stats.total} ({stats.favPct}%)</span>
            <span style={{ fontSize: '0.75rem', color: DOG_COLOR, fontWeight: '600' }}>Dog {dogVerb} {stats.dogWins}/{stats.total} ({stats.dogPct}%)</span>
          </div>
        );

        return (
        <div style={{ marginTop: '14px', padding: '12px', background: 'rgba(0,0,0,0.2)', borderRadius: '10px' }}>
          <div style={{ display: 'flex', alignItems: 'center', gap: '8px', marginBottom: '8px' }}>
            <button onClick={() => setLocalMlMode(!localMlMode)} style={{
              fontSize: '0.65rem', padding: '3px 8px', borderRadius: '4px', cursor: 'pointer',
              background: localMlMode ? 'rgba(255,215,0,0.25)' : 'rgba(255,255,255,0.07)',
              border: localMlMode ? '1px solid rgba(255,215,0,0.6)' : '1px solid rgba(255,255,255,0.2)',
              color: localMlMode ? '#FFD700' : 'rgba(255,255,255,0.5)',
              fontWeight: localMlMode ? '700' : '500',
            }}>{localMlMode ? 'ML Winner' : 'ATS Cover'}</button>
            <span style={{ fontSize: '0.75rem', color: 'rgba(255,255,255,0.5)', fontWeight: '600' }}>
              SIMILAR PATTERNS ({similar.length} playoff games with same Q{game.quarters.map(q => q.qNum).join('+')} flow)
            </span>
          </div>
          {remainingQStats.length > 0 && remainingQStats.map(stat => (
            <div key={stat.qNum} style={{ display: 'flex', gap: '16px', alignItems: 'center', marginBottom: '4px' }}>
              <span style={{ fontSize: '0.8rem', color: 'rgba(255,255,255,0.6)', minWidth: '30px' }}>Q{stat.qNum}:</span>
              <div style={{ display: 'flex', gap: '12px' }}>
                <span style={{ fontSize: '0.8rem', color: FAV_COLOR, fontWeight: '600' }}>
                  Fav wins {stat.favWins}/{stat.total} ({stat.favPct}%)
                </span>
                <span style={{ fontSize: '0.8rem', color: DOG_COLOR, fontWeight: '600' }}>
                  Dog wins {stat.dogWins}/{stat.total} ({stat.dogPct}%)
                </span>
              </div>
            </div>
          ))}

          {/* Final result */}
          <div style={{ marginTop: '10px', fontSize: '0.7rem', color: 'rgba(255,255,255,0.4)', fontWeight: '600', marginBottom: '4px' }}>FINAL RESULT</div>
          {statLine('Overall', finalStats(similar))}

          {/* By game number */}
          <div style={{ marginTop: '8px', fontSize: '0.7rem', color: 'rgba(255,255,255,0.4)', fontWeight: '600', marginBottom: '4px' }}>BY GAME #</div>
          {Object.keys(byGameNum).sort((a, b) => a - b).map(gn => (
            <React.Fragment key={`gn${gn}`}>{statLine(`Game ${gn}`, finalStats(byGameNum[gn]))}</React.Fragment>
          ))}

          {/* By round */}
          <div style={{ marginTop: '8px', fontSize: '0.7rem', color: 'rgba(255,255,255,0.4)', fontWeight: '600', marginBottom: '4px' }}>BY ROUND</div>
          {Object.keys(byRound).sort((a, b) => a - b).map(r => (
            <React.Fragment key={`r${r}`}>{statLine(ROUND_LABELS[r] || `R${r}`, finalStats(byRound[r]))}</React.Fragment>
          ))}

          {/* By spread size */}
          <div style={{ marginTop: '8px', fontSize: '0.7rem', color: 'rgba(255,255,255,0.4)', fontWeight: '600', marginBottom: '4px' }}>BY SPREAD SIZE</div>
          {['1-3', '3.5-6', '6.5-9', '9.5+'].filter(b => bySpreadBucket[b]).map(b => (
            <React.Fragment key={`s${b}`}>{statLine(b + ' pts', finalStats(bySpreadBucket[b]))}</React.Fragment>
          ))}
        </div>
        );
      })()}

      {/* Expand/collapse for completed games */}
      {game.isComplete && !game._hasTestScores && similar.length > 0 && (
        <button onClick={() => setExpanded(!expanded)} style={{
          marginTop: '8px',
          padding: '4px 12px',
          background: 'rgba(255,255,255,0.07)',
          border: '1px solid rgba(255,255,255,0.15)',
          borderRadius: '6px',
          color: 'rgba(255,255,255,0.5)',
          fontSize: '0.7rem',
          cursor: 'pointer',
        }}>
          {expanded ? 'Hide' : 'Show'} similar patterns ({similar.length})
        </button>
      )}
    </div>
  );
}

// ── App ─────────────────────────────────────────────────────────────────────

function App() {
  const [rawGames, setRawGames] = useState([]);
  const [loading, setLoading] = useState(true);
  const [error, setError] = useState(null);
  const [filterRound, setFilterRound] = useState(new Set());
  const [filterSeriesGame, setFilterSeriesGame] = useState(new Set());
  const [filterSpreadRange, setFilterSpreadRange] = useState(new Set());
  const [filterFavSide, setFilterFavSide] = useState(new Set());
  const [filterYear, setFilterYear] = useState(new Set());

  const [marginThresholds, setMarginThresholds] = useState(() => {
    const params = new URLSearchParams(window.location.search);
    const mt = params.get('mt');
    if (mt) {
      const vals = mt.split(',').map(Number);
      if (vals.length === 3 && vals.every(v => v > 0) && vals[0] < vals[1] && vals[1] < vals[2]) return vals;
    }
    return DEFAULT_MARGIN_THRESHOLDS;
  });
  const [testScores, setTestScores] = useState(() => {
    try { return JSON.parse(localStorage.getItem('boxscore_testScores') || '{}'); } catch { return {}; }
  });
  const updateTestScore = (gk, qIdx, side, val) => {
    setTestScores(prev => {
      const next = { ...prev };
      if (!next[gk]) next[gk] = {};
      if (!next[gk][qIdx]) next[gk][qIdx] = {};
      next[gk][qIdx][side] = val === '' ? '' : parseInt(val) || 0;
      localStorage.setItem('boxscore_testScores', JSON.stringify(next));
      return next;
    });
  };
  const clearTestScores = (gk) => {
    setTestScores(prev => {
      const next = { ...prev };
      delete next[gk];
      localStorage.setItem('boxscore_testScores', JSON.stringify(next));
      return next;
    });
  };
  const [atsDetail, setAtsDetail] = useState(null); // { label, details[] }
  const [mlMode, setMlMode] = useState(false); // moneyline mode - ignore spread
  const [linkedGameKeys, setLinkedGameKeys] = useState(() => {
    // Read linked games from URL query params on initial load
    const params = new URLSearchParams(window.location.search);
    const linkedParam = params.get('linked');
    if (linkedParam) {
      return new Set(linkedParam.split(';').map(s => decodeURIComponent(s)).filter(Boolean));
    }
    return new Set();
  });

  // Sync linked games to URL query params
  useEffect(() => {
    const params = new URLSearchParams(window.location.search);
    if (linkedGameKeys.size > 0) {
      params.set('linked', [...linkedGameKeys].map(k => encodeURIComponent(k)).join(';'));
    } else {
      params.delete('linked');
    }
    const newUrl = params.toString() ? `${window.location.pathname}?${params}` : window.location.pathname;
    window.history.replaceState({}, '', newUrl);
  }, [linkedGameKeys]);

  // Sync margin thresholds to URL query params
  useEffect(() => {
    const params = new URLSearchParams(window.location.search);
    const isDefault = marginThresholds.every((v, i) => v === DEFAULT_MARGIN_THRESHOLDS[i]);
    if (isDefault) {
      params.delete('mt');
    } else {
      params.set('mt', marginThresholds.join(','));
    }
    const newUrl = params.toString() ? `${window.location.pathname}?${params}` : window.location.pathname;
    window.history.replaceState({}, '', newUrl);
  }, [marginThresholds]);

  const toggleLink = (gameKey) => {
    setLinkedGameKeys(prev => {
      const next = new Set(prev);
      if (next.has(gameKey)) next.delete(gameKey); else next.add(gameKey);
      return next;
    });
  };

  const gameKey = (g) => `${g.date}|${g.away}|${g.home}`;

  useEffect(() => {
    const load = async () => {
      try {
        const bust = Math.floor(Date.now() / (60 * 1000));
        // Fetch full sheet (may have stale over_under due to Google cache)
        const res = await fetch(sheetCsvUrl(TAB) + '&v=' + bust);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const rows = parseSheetCsv(await res.text());

        // Patch: fetch last 200 rows with range to bypass cache for over_under
        try {
          const totalRows = rows.length + 1; // +1 for header
          const startRow = Math.max(2, totalRows - 200);
          const patchRes = await fetch(sheetCsvUrl(TAB, `A1:L1`) + '&v=' + bust);
          const patchRes2 = await fetch(sheetCsvUrl(TAB, `A${startRow}:L${totalRows + 50}`) + '&v=' + bust);
          if (patchRes.ok && patchRes2.ok) {
            const headerText = await patchRes.text();
            const dataText = await patchRes2.text();
            const patchRows = parseSheetCsv(headerText + '\n' + dataText);
            // Build lookup by date+away+home
            const patchMap = {};
            for (const pr of patchRows) {
              const key = `${pr.game_date}|${pr.away_team}|${pr.home_team}`;
              patchMap[key] = pr;
            }
            // Patch over_under into main rows
            for (const row of rows) {
              const key = `${row.game_date}|${row.away_team}|${row.home_team}`;
              if (patchMap[key] && patchMap[key].over_under && !row.over_under) {
                row.over_under = patchMap[key].over_under;
              }
            }
          }
        } catch (e) { console.warn('Patch fetch failed:', e); }

        const games = rows.map(parseGame).filter(Boolean);
        setRawGames(games);
      } catch (e) {
        setError(e.message);
      } finally {
        setLoading(false);
      }
    };
    load();
  }, []);

  // Re-bucket quarters when margin thresholds change, apply test scores
  const games = useMemo(() => {
    return rawGames.map(g => {
      const gk = `${g.date}|${g.away}|${g.home}`;
      const ts = testScores[gk];
      // If test scores exist for this game, rebuild quarters from them
      if (ts && Object.keys(ts).length > 0) {
        let runAway = 0, runHome = 0;
        const newQuarters = [];
        for (let i = 0; i < 4; i++) {
          const tq = ts[i];
          if (!tq || tq.away === '' || tq.home === '' || tq.away === undefined || tq.home === undefined) {
            // Use existing quarter data if available
            if (i < g.quarters.length) {
              newQuarters.push({ ...g.quarters[i], bucket: marginBucket(g.quarters[i].margin, marginThresholds) });
            }
            break; // Stop at first missing test quarter
          }
          const away = parseInt(tq.away) || 0;
          const home = parseInt(tq.home) || 0;
          runAway += away;
          runHome += home;
          const margin = home - away;
          const winner = margin > 0 ? 'home' : margin < 0 ? 'away' : 'tie';
          const favWon = winner === g.favSide ? 'fav' : winner === 'tie' ? 'tie' : 'dog';
          const qTotal = away + home;
          const runTotal = runAway + runHome;
          const projectedTotal = g.totalLine ? Math.round(runTotal / (i + 1) * 4) : null;
          newQuarters.push({
            qNum: i + 1, away, home, margin, winner, favWon,
            bucket: marginBucket(margin, marginThresholds),
            runAway, runHome, runMargin: runHome - runAway,
            qTotal, runTotal, projectedTotal,
            totalPace: g.totalLine ? (runTotal - (g.totalLine / 4 * (i + 1))) : null,
          });
        }
        const finalAway = runAway;
        const finalHome = runHome;
        const isComplete = newQuarters.length >= 4;
        return {
          ...g,
          quarters: newQuarters,
          finalAway: isComplete ? finalAway : g.finalAway,
          finalHome: isComplete ? finalHome : g.finalHome,
          finalMargin: isComplete ? finalHome - finalAway : g.finalMargin,
          finalTotal: isComplete ? finalAway + finalHome : g.finalTotal,
          isComplete: isComplete || g.isComplete,
          isLive: !isComplete && newQuarters.length > 0,
          isUpcoming: newQuarters.length === 0,
          _hasTestScores: true,
        };
      }
      return {
        ...g,
        quarters: g.quarters.map(q => ({
          ...q,
          bucket: marginBucket(q.margin, marginThresholds),
        })),
      };
    });
  }, [rawGames, marginThresholds, testScores]);

  const filteredGames = useMemo(() => {
    return games.filter(g => {
      if (filterRound.size > 0 && !filterRound.has(g.round)) return false;
      if (filterSeriesGame.size > 0 && !filterSeriesGame.has(g.seriesGame)) return false;
      if (filterFavSide.size > 0 && !filterFavSide.has(g.favSide)) return false;
      if (filterYear.size > 0 && !filterYear.has(parseInt(g.date.slice(0, 4)))) return false;
      if (filterSpreadRange.size > 0) {
        const abs = Math.abs(g.spread);
        let matched = false;
        for (const range of filterSpreadRange) {
          const [min, max] = range.split('-').map(Number);
          if (abs >= min && abs <= max) { matched = true; break; }
        }
        if (!matched) return false;
      }
      return true;
    }).sort((a, b) => {
      // Live first, then upcoming, then by date desc
      if (a.isLive && !b.isLive) return -1;
      if (!a.isLive && b.isLive) return 1;
      if (a.isUpcoming && !b.isUpcoming && !b.isLive) return -1;
      if (!a.isUpcoming && !a.isLive && b.isUpcoming) return 1;
      return b.date.localeCompare(a.date) || a.away.localeCompare(b.away);
    });
  }, [games, filterRound, filterSeriesGame, filterSpreadRange, filterFavSide, filterYear]);

  const patternFilters = useMemo(() => ({
    spreadRange: filterSpreadRange.size === 1 ? [...filterSpreadRange][0].split('-').map(Number) : null,
  }), [filterSpreadRange]);

  const uniqueRounds = useMemo(() => [...new Set(games.map(g => g.round))].sort(), [games]);
  const uniqueSeriesGames = useMemo(() => [...new Set(games.map(g => g.seriesGame))].sort(), [games]);
  const uniqueYears = useMemo(() => [...new Set(games.map(g => parseInt(g.date.slice(0, 4))))].sort(), [games]);

  // Aggregate stats
  const stats = useMemo(() => {
    const completed = filteredGames.filter(g => g.isComplete);
    if (completed.length === 0) return null;

    const qStats = [1, 2, 3, 4].map(qNum => {
      const games = completed.filter(g => g.quarters.length >= qNum);
      const favWins = games.filter(g => g.quarters[qNum - 1].favWon === 'fav').length;
      const dogWins = games.filter(g => g.quarters[qNum - 1].favWon === 'dog').length;
      return {
        qNum,
        total: games.length,
        favWins,
        dogWins,
        favPct: games.length > 0 ? Math.round(favWins / games.length * 100) : 0,
      };
    });

    return { completed: completed.length, qStats };
  }, [filteredGames]);

  return (
    <div style={{ minHeight: '100vh', background: 'linear-gradient(135deg, #FA4616 0%, #d63a0f 40%, #0021A5 100%)', fontFamily: "'Segoe UI', system-ui, sans-serif", color: '#fff', padding: '20px', overflowX: 'auto', WebkitOverflowScrolling: 'touch' }}>
      {/* Header */}
      <div style={{ textAlign: 'center', marginBottom: '24px', padding: '20px', background: 'rgba(0,33,165,0.3)', borderRadius: '16px', border: '2px solid rgba(0,33,165,0.5)' }}>
        <h1 style={{ fontSize: '2.2rem', fontWeight: '800', background: 'linear-gradient(90deg, #fff, #0021A5, #fff)', WebkitBackgroundClip: 'text', WebkitTextFillColor: 'transparent', marginBottom: '6px' }}>
          BOX SCORE PATTERNS
        </h1>
        <p style={{ color: 'rgba(255,255,255,0.7)', fontSize: '0.85rem', marginBottom: '10px' }}>
          NBA Playoff Quarter Flow &bull; <a href="index.html" style={{ color: 'rgba(255,255,255,0.7)', textDecoration: 'underline' }}>Fade Finder</a> &bull; <a href="journal.html" style={{ color: 'rgba(255,255,255,0.7)', textDecoration: 'underline' }}>Picks Journal</a>
        </p>
        <div style={{ display: 'flex', justifyContent: 'center', gap: '16px', fontSize: '0.8rem', flexWrap: 'wrap' }}>
          <span style={{ color: FAV_COLOR }}>Blue = Favorite</span>
          <span style={{ color: DOG_COLOR }}>Red = Underdog</span>
          <span style={{ color: 'rgba(255,255,255,0.5)' }}>+ (1-4) &bull; ++ (5-9) &bull; +++ (10-16) &bull; ++++ (17+)</span>
        </div>
      </div>

      {/* Quarter Summary */}
      {stats && (
        <div style={{ background: 'rgba(0,33,165,0.25)', borderRadius: '12px', padding: '16px', marginBottom: '16px', border: '1px solid rgba(0,33,165,0.4)' }}>
          <div style={{ fontSize: '0.75rem', color: 'rgba(255,255,255,0.4)', marginBottom: '8px', fontWeight: '600', textTransform: 'uppercase', letterSpacing: '0.5px' }}>
            Quarter Win Rates ({stats.completed} games)
          </div>
          <div style={{ display: 'flex', gap: '16px', flexWrap: 'wrap' }}>
            {stats.qStats.map(q => (
              <div key={q.qNum} style={{ display: 'flex', alignItems: 'center', gap: '8px' }}>
                <span style={{ fontSize: '0.8rem', color: 'rgba(255,255,255,0.6)', fontWeight: '600' }}>Q{q.qNum}:</span>
                <span style={{ fontSize: '0.8rem', color: FAV_COLOR, fontWeight: '700' }}>Fav {q.favPct}%</span>
                <span style={{ fontSize: '0.8rem', color: 'rgba(255,255,255,0.3)' }}>|</span>
                <span style={{ fontSize: '0.8rem', color: DOG_COLOR, fontWeight: '700' }}>Dog {100 - q.favPct}%</span>
              </div>
            ))}
          </div>
        </div>
      )}

      {/* Filters */}
      <div style={{ background: 'rgba(0,33,165,0.25)', borderRadius: '12px', padding: '16px', marginBottom: '20px', border: '1px solid rgba(0,33,165,0.4)' }}>
        {(() => {
          const toggleSet = (setter, val) => setter(prev => {
            const next = new Set(prev);
            if (next.has(val)) next.delete(val); else next.add(val);
            return next;
          });
          const btnStyle = (active) => ({
            padding: '6px 12px',
            background: active ? 'rgba(90,155,213,0.3)' : 'rgba(255,255,255,0.05)',
            border: active ? '1px solid rgba(90,155,213,0.6)' : '1px solid rgba(255,255,255,0.15)',
            borderRadius: '6px',
            color: active ? '#fff' : 'rgba(255,255,255,0.5)',
            fontSize: '0.8rem',
            cursor: 'pointer',
            fontWeight: active ? '700' : '500',
          });
          const labelStyle = { fontSize: '0.7rem', color: 'rgba(255,255,255,0.35)', fontWeight: '600', textTransform: 'uppercase', letterSpacing: '0.5px', marginRight: '4px' };
          const hasFilters = filterRound.size > 0 || filterSeriesGame.size > 0 || filterSpreadRange.size > 0 || filterFavSide.size > 0 || filterYear.size > 0;
          return (<>
        <div style={{ display: 'flex', gap: '8px', flexWrap: 'wrap', alignItems: 'center' }}>
          <button style={{
            padding: '6px 12px',
            background: mlMode ? 'rgba(255,215,0,0.25)' : 'rgba(255,255,255,0.05)',
            border: mlMode ? '1px solid rgba(255,215,0,0.6)' : '1px solid rgba(255,255,255,0.15)',
            borderRadius: '6px',
            color: mlMode ? '#FFD700' : 'rgba(255,255,255,0.5)',
            fontSize: '0.8rem',
            cursor: 'pointer',
            fontWeight: mlMode ? '700' : '500',
          }} onClick={() => setMlMode(prev => !prev)}>ML Winner</button>
          <span style={labelStyle}>Round</span>
          {uniqueRounds.map(r => <button key={r} style={btnStyle(filterRound.has(r))} onClick={() => toggleSet(setFilterRound, r)}>R{r}</button>)}
          <span style={{ ...labelStyle, marginLeft: '8px' }}>Game</span>
          {uniqueSeriesGames.map(g => <button key={g} style={btnStyle(filterSeriesGame.has(g))} onClick={() => toggleSet(setFilterSeriesGame, g)}>G{g}</button>)}
          <span style={{ ...labelStyle, marginLeft: '8px' }}>Spread</span>
          {[['0-3','0–3'],['3-6','3–6'],['6-10','6–10'],['10-99','10+']].map(([val,lbl]) => <button key={val} style={btnStyle(filterSpreadRange.has(val))} onClick={() => toggleSet(setFilterSpreadRange, val)}>{lbl}</button>)}
          <span style={{ ...labelStyle, marginLeft: '8px' }}>Side</span>
          <button style={btnStyle(filterFavSide.has('home'))} onClick={() => toggleSet(setFilterFavSide, 'home')}>Home</button>
          <button style={btnStyle(filterFavSide.has('away'))} onClick={() => toggleSet(setFilterFavSide, 'away')}>Away</button>
          <span style={{ ...labelStyle, marginLeft: '8px' }}>Year</span>
          {uniqueYears.map(y => <button key={y} style={btnStyle(filterYear.has(y))} onClick={() => toggleSet(setFilterYear, y)}>{y}</button>)}
          {hasFilters && (
            <button onClick={() => { setFilterRound(new Set()); setFilterSeriesGame(new Set()); setFilterSpreadRange(new Set()); setFilterFavSide(new Set()); setFilterYear(new Set()); }}
              style={{ padding: '6px 12px', background: 'rgba(255,100,100,0.2)', border: '1px solid rgba(255,100,100,0.5)', borderRadius: '6px', color: '#FF6B6B', fontSize: '0.8rem', cursor: 'pointer', fontWeight: '600' }}>
              Clear
            </button>
          )}
        </div>
          </>);
        })()}
        {/* Margin bucket thresholds */}
        <div style={{ display: 'flex', gap: '12px', flexWrap: 'wrap', alignItems: 'center', marginTop: '10px', paddingTop: '10px', borderTop: '1px solid rgba(255,255,255,0.08)' }}>
          <span style={{ fontSize: '0.75rem', color: 'rgba(255,255,255,0.4)', fontWeight: '600', textTransform: 'uppercase', letterSpacing: '0.5px' }}>Margin Ranges:</span>
          {[
            { symbol: '+', label: 'Close', idx: 0, from: 1 },
            { symbol: '++', label: 'Comfortable', idx: 1, from: null },
            { symbol: '+++', label: 'Dominant', idx: 2, from: null },
            { symbol: '++++', label: 'Blowout', idx: null, from: null },
          ].map((bucket, i) => {
            const low = i === 0 ? 1 : marginThresholds[i - 1] + 1;
            const high = bucket.idx !== null ? marginThresholds[bucket.idx] : null;
            const adjustThreshold = (idx, delta) => {
              setMarginThresholds(prev => {
                const next = [...prev];
                const newVal = next[idx] + delta;
                const min = idx === 0 ? 1 : next[idx - 1] + 1;
                const max = idx === 2 ? 50 : next[idx + 1] - 1;
                if (newVal < min || newVal > max) return prev;
                next[idx] = newVal;
                return next;
              });
            };
            const btnStyle = { background: 'none', border: 'none', color: 'rgba(255,255,255,0.5)', fontSize: '0.7rem', cursor: 'pointer', padding: '0 2px', lineHeight: 1 };
            return (
              <div key={i} style={{ display: 'flex', alignItems: 'center', gap: '4px', fontSize: '0.8rem', color: 'rgba(255,255,255,0.6)' }}>
                <span style={{ fontWeight: '700', color: 'rgba(255,215,0,0.7)', minWidth: '36px' }}>{bucket.symbol}</span>
                <span>{low}–{high || '+'}</span>
                {bucket.idx !== null && (
                  <span style={{ display: 'flex', flexDirection: 'column' }}>
                    <button style={btnStyle} onClick={() => adjustThreshold(bucket.idx, 1)}>&#9650;</button>
                    <button style={btnStyle} onClick={() => adjustThreshold(bucket.idx, -1)}>&#9660;</button>
                  </span>
                )}
              </div>
            );
          })}
        </div>
        {!loading && games.length > 0 && (
          <div style={{ fontSize: '0.75rem', color: 'rgba(255,255,255,0.4)', marginTop: '10px', paddingTop: '10px', borderTop: '1px solid rgba(255,255,255,0.08)' }}>
            <div>{(filterRound.size > 0 || filterSeriesGame.size > 0 || filterSpreadRange.size > 0 || filterFavSide.size > 0 || filterYear.size > 0)
              ? `Showing ${filteredGames.length} of ${games.length} games (${games.length - filteredGames.length} excluded)`
              : `${games.length} games`}</div>
            {(() => {
              const spreadBuckets = [
                [0.5, 3, '0–3'], [3.5, 5.5, '3.5–5.5'], [6, 9.5, '6–9.5'],
                [10, 13.5, '10–13.5'], [14, 16.5, '14–16.5'], [17, Infinity, '17+'],
              ];
              const rounds = [1, 2, 3, 4];
              const countFor = (r, min, max) => filteredGames.filter(g => (r === null || g.round === r) && (() => { const s = Math.abs(g.spread); return s >= min && s <= max; })()).length;
              const countNoLine = (r) => filteredGames.filter(g => (r === null || g.round === r) && g.spread === 0).length;
              const atsFor = (r, min, max) => {
                const subset = mlMode
                  ? filteredGames.filter(g => g.isComplete && (r === null || g.round === r) && (() => { const s = Math.abs(g.spread); return s >= min && s <= max; })())
                  : filteredGames.filter(g => g.isComplete && g.spread !== 0 && (r === null || g.round === r) && (() => { const s = Math.abs(g.spread); return s >= min && s <= max; })());
                let w = 0, l = 0, p = 0;
                const details = [];
                const shortName = (name) => {
                  const teams = {'Trail Blazers':1,'76ers':1,'Blue Jays':1,'Red Sox':1,'White Sox':1};
                  const parts = name.split(' ');
                  if (parts.length >= 3) {
                    const last2 = parts.slice(-2).join(' ');
                    if (teams[last2]) return last2;
                  }
                  return parts[parts.length - 1];
                };
                for (const g of subset) {
                  const favMargin = g.favSide === 'home' ? g.finalMargin : -g.finalMargin;
                  const line = Math.abs(g.spread);
                  const favTeam = g.favSide === 'home' ? g.home : g.away;
                  let result;
                  if (mlMode) {
                    result = favMargin > 0 ? 'W' : favMargin < 0 ? 'L' : 'P';
                  } else {
                    result = favMargin - line > 0 ? 'W' : favMargin - line < 0 ? 'L' : 'P';
                  }
                  if (result === 'W') w++; else if (result === 'L') l++; else p++;
                  const spreadInfo = line ? `(${shortName(favTeam)} -${line})` : '';
                  details.push(`${result} ${g.date} R${g.round}G${g.seriesGame} ${shortName(g.away)} ${g.finalAway} @ ${shortName(g.home)} ${g.finalHome} ${spreadInfo}`);
                }
                const record = `${w}-${l}${p ? `-${p}` : ''}`;
                const tooltip = details.join('\n');
                return { record, tooltip, details };
              };
              const thStyle = { padding: '2px 6px', fontSize: '0.7rem', color: 'rgba(255,255,255,0.5)', fontWeight: '600', textAlign: 'center', borderBottom: '1px solid rgba(255,255,255,0.1)' };
              const tdStyle = { padding: '1px 6px', fontSize: '0.7rem', color: 'rgba(255,255,255,0.5)', textAlign: 'center' };
              const tdLabelStyle = { ...tdStyle, textAlign: 'left', fontWeight: '600' };
              const recordSpan = (ats, cellLabel) => (
                <span style={{ color: 'rgba(255,255,255,0.3)', cursor: ats.tooltip ? 'pointer' : 'default', textDecoration: ats.tooltip ? 'underline dotted' : 'none' }}
                  title={ats.tooltip}
                  onClick={() => ats.details.length > 0 && setAtsDetail(prev => prev && prev.label === cellLabel ? null : { label: cellLabel, details: ats.details })}>
                  ({ats.record})
                </span>
              );
              return (
                <table style={{ borderCollapse: 'collapse', marginTop: '8px', width: '100%' }}>
                  <thead>
                    <tr>
                      <th style={{ ...thStyle, textAlign: 'left' }}>{mlMode ? 'Spread (ML)' : 'Spread (ATS)'}</th>
                      {rounds.map(r => <th key={r} style={thStyle}>R{r}</th>)}
                      <th style={thStyle}>Total</th>
                    </tr>
                  </thead>
                  <tbody>
                    {spreadBuckets.map(([min, max, label]) => (
                      <tr key={label}>
                        <td style={tdLabelStyle}>{label}</td>
                        {rounds.map(r => { const ats = atsFor(r, min, max); return <td key={r} style={tdStyle}>{countFor(r, min, max)} {recordSpan(ats, `R${r} ${label}`)}</td>; })}
                        {(() => { const ats = atsFor(null, min, max); return <td style={{ ...tdStyle, fontWeight: '600' }}>{countFor(null, min, max)} {recordSpan(ats, `All ${label}`)}</td>; })()}
                      </tr>
                    ))}
                    {countNoLine(null) > 0 && (
                      <tr>
                        <td style={tdLabelStyle}>No line</td>
                        {rounds.map(r => <td key={r} style={tdStyle}>{countNoLine(r)}</td>)}
                        <td style={{ ...tdStyle, fontWeight: '600' }}>{countNoLine(null)}</td>
                      </tr>
                    )}
                    <tr style={{ borderTop: '1px solid rgba(255,255,255,0.1)' }}>
                      <td style={{ ...tdLabelStyle, fontWeight: '700' }}>Total</td>
                      {rounds.map(r => { const ats = atsFor(r, 0, Infinity); return <td key={r} style={{ ...tdStyle, fontWeight: '700' }}>{filteredGames.filter(g => g.round === r).length} {recordSpan(ats, `R${r} All`)}</td>; })}
                      {(() => { const ats = atsFor(null, 0, Infinity); return <td style={{ ...tdStyle, fontWeight: '700' }}>{filteredGames.length} {recordSpan(ats, 'All')}</td>; })()}
                    </tr>
                  </tbody>
                </table>
              );
            })()}
            {atsDetail && (
              <div style={{ marginTop: '8px', padding: '8px 10px', background: 'rgba(0,0,0,0.2)', borderRadius: '8px', border: '1px solid rgba(255,255,255,0.1)' }}>
                <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '4px' }}>
                  <span style={{ fontSize: '0.7rem', fontWeight: '700', color: 'rgba(255,255,255,0.5)', textTransform: 'uppercase', letterSpacing: '0.5px' }}>{atsDetail.label}</span>
                  <button onClick={() => setAtsDetail(null)} style={{ background: 'none', border: 'none', color: 'rgba(255,255,255,0.4)', fontSize: '0.8rem', cursor: 'pointer', padding: '0 4px' }}>&#x2715;</button>
                </div>
                {atsDetail.details.map((d, i) => {
                  const isLoss = d.startsWith('L');
                  const isPush = d.startsWith('P');
                  return <div key={i} style={{ fontSize: '0.7rem', color: isLoss ? DOG_COLOR : isPush ? 'rgba(255,255,255,0.4)' : FAV_COLOR, fontFamily: 'monospace', lineHeight: '1.5' }}>{d}</div>;
                })}
              </div>
            )}
          </div>
        )}
      </div>

      {loading && <div style={{ textAlign: 'center', padding: '40px', color: '#FFD700' }}>Loading playoff data...</div>}
      {error && <div style={{ textAlign: 'center', padding: '40px', color: '#FF6B6B' }}>Error: {error}</div>}

      {!loading && filteredGames.length === 0 && (
        <div style={{ textAlign: 'center', padding: '40px', background: 'rgba(0,33,165,0.2)', borderRadius: '12px', border: '1px solid rgba(255,255,255,0.1)' }}>
          <div style={{ fontSize: '1.2rem', fontWeight: '700', marginBottom: '8px' }}>No playoff games found</div>
          <div style={{ color: 'rgba(255,255,255,0.6)', fontSize: '0.9rem' }}>
            Tag games in the nba_schedule sheet with round_1,game_1 etc.
          </div>
        </div>
      )}

      {/* Linked Games Comparison */}
      {linkedGameKeys.size > 1 && (() => {
        const linked = filteredGames.filter(g => linkedGameKeys.has(gameKey(g)));
        if (linked.length < 2) return null;
        return (
          <div style={{
            background: 'rgba(0,33,165,0.25)',
            borderRadius: '14px',
            padding: '20px',
            marginBottom: '24px',
            border: '2px solid rgba(90,155,213,0.4)',
          }}>
            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '16px' }}>
              <div style={{ fontSize: '0.85rem', fontWeight: '700', color: FAV_COLOR }}>
                LINKED COMPARISON ({linked.length} games)
              </div>
              <button onClick={() => setLinkedGameKeys(new Set())} style={{
                padding: '4px 12px',
                background: 'rgba(255,100,100,0.2)',
                border: '1px solid rgba(255,100,100,0.5)',
                borderRadius: '6px',
                color: '#FF6B6B',
                fontSize: '0.7rem',
                cursor: 'pointer',
                fontWeight: '600',
              }}>Unlink All</button>
            </div>
            {/* Spread Table */}
            {(() => {
              const refGame = linked[0]; // first linked game is the reference
              return (<>
            <div style={{ fontSize: '0.75rem', fontWeight: '700', color: FAV_COLOR, marginBottom: '8px' }}>SPREAD</div>
            <div style={{ overflowX: 'auto', WebkitOverflowScrolling: 'touch', marginBottom: '20px' }}>
              <table style={{ borderCollapse: 'collapse', width: '100%', minWidth: '700px' }}>
                <thead>
                  <tr>
                    <th style={{ textAlign: 'left', padding: '6px 10px', fontSize: '0.7rem', color: 'rgba(255,255,255,0.4)', fontWeight: '600', width: '220px' }}>Game</th>
                    {[1,2,3,4].map(q => (
                      <th key={q} style={{ textAlign: 'center', padding: '6px 10px', fontSize: '0.7rem', color: 'rgba(255,255,255,0.4)', fontWeight: '600', width: '100px' }}>Q{q}</th>
                    ))}
                    <th style={{ textAlign: 'center', padding: '6px 10px', fontSize: '0.7rem', color: 'rgba(255,255,255,0.4)', fontWeight: '600', width: '80px' }}>Final</th>
                  </tr>
                </thead>
                <tbody>
                  {linked.map((g, gi) => {
                    const favLbl = g.favSide === 'home' ? g.home : g.away;
                    const absSpread = Math.abs(g.spread);
                    return (
                      <tr key={gameKey(g)} style={{ borderTop: '1px solid rgba(255,255,255,0.08)' }}>
                        <td style={{ padding: '8px 10px', verticalAlign: 'top' }}>
                          <div style={{ display: 'flex', alignItems: 'flex-start', gap: '6px' }}>
                            {gi > 0 && (
                              <button onClick={() => toggleLink(gameKey(g))} style={{
                                background: 'rgba(255,100,100,0.15)',
                                border: '1px solid rgba(255,100,100,0.4)',
                                borderRadius: '4px',
                                color: '#FF6B6B',
                                fontSize: '0.7rem',
                                cursor: 'pointer',
                                padding: '2px 4px',
                                lineHeight: 1,
                                flexShrink: 0,
                                marginTop: '2px',
                              }}>&#x2715;</button>
                            )}
                            <div>
                              <div style={{ fontSize: '0.75rem', color: 'rgba(255,255,255,0.4)' }}>{g.date} R{g.round}G{g.seriesGame}</div>
                              <div style={{ fontSize: '0.85rem', fontWeight: '600', color: '#fff' }}>{g.away} @ {g.home}</div>
                              <div style={{ fontSize: '0.85rem', fontWeight: '600', color: '#fff' }}>{favLbl} -{absSpread}</div>
                            </div>
                          </div>
                        </td>
                        {[0,1,2,3].map(qi => {
                          const q = g.quarters[qi];
                          if (!q) return <td key={qi} style={{ textAlign: 'center', padding: '8px', color: 'rgba(255,255,255,0.2)' }}>—</td>;
                          const winColor = q.favWon === 'fav' ? FAV_COLOR : q.favWon === 'dog' ? DOG_COLOR : TIE_COLOR;
                          const runIsFav = (q.runMargin > 0 ? 'home' : 'away') === g.favSide;
                          // Compare to first game's quarter
                          let borderColor = 'transparent';
                          if (gi > 0 && refGame.quarters[qi]) {
                            const refQ = refGame.quarters[qi];
                            if (q.favWon !== 'tie' && refQ.favWon !== 'tie') {
                              borderColor = q.favWon === refQ.favWon ? '#70AD47' : '#FFD700';
                            }
                          }
                          return (
                            <td key={qi} style={{ textAlign: 'center', padding: '4px', verticalAlign: 'top' }}>
                              <div style={{ padding: '6px', borderRadius: '6px', border: gi > 0 && borderColor !== 'transparent' ? `2px solid ${borderColor}` : '2px solid transparent' }}>
                              <div style={{ fontSize: '0.8rem', color: 'rgba(255,255,255,0.6)' }}>{q.away}-{q.home}</div>
                              <div style={{ fontSize: '0.75rem', fontWeight: '700', color: winColor }}>
                                {q.favWon === 'tie' ? 'TIE' : q.favWon.toUpperCase()} {q.bucket.symbol}
                              </div>
                              <div style={{ fontSize: '0.6rem', color: 'rgba(255,255,255,0.35)' }}>
                                {q.margin === 0 ? 'Even' : `${(q.winner === g.favSide ? 'Fav' : 'Dog')} +${Math.abs(q.margin)}`}
                                {' '}({q.runMargin === 0 ? 'Tied' : `${runIsFav ? 'Fav' : 'Dog'} +${Math.abs(q.runMargin)}`})
                              </div>
                              </div>
                            </td>
                          );
                        })}
                        <td style={{ textAlign: 'center', padding: '8px', verticalAlign: 'top' }}>
                          {g.isComplete ? (
                            <div>
                              <div style={{ fontSize: '0.85rem', fontWeight: '700', color: '#fff' }}>{g.finalAway}-{g.finalHome}</div>
                              <div style={{
                                fontSize: '0.65rem',
                                fontWeight: '600',
                                color: (g.finalMargin > 0 ? 'home' : 'away') === g.favSide ? FAV_COLOR : DOG_COLOR,
                              }}>
                                {(g.finalMargin > 0 ? 'home' : 'away') === g.favSide ? 'FAV' : 'DOG'} +{Math.abs(g.finalMargin)}
                                {Math.abs(g.finalMargin) > absSpread ? ' COV' : ''}
                              </div>
                            </div>
                          ) : <span style={{ color: 'rgba(255,255,255,0.2)' }}>—</span>}
                        </td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>
            </>);
            })()}

            {(() => {
              const refGame = linked[0];
              return (<>
            <div style={{ fontSize: '0.75rem', fontWeight: '700', color: OVER_COLOR, marginBottom: '8px' }}>TOTAL</div>
            <div style={{ overflowX: 'auto', WebkitOverflowScrolling: 'touch' }}>
              <table style={{ borderCollapse: 'collapse', width: '100%', minWidth: '700px' }}>
                <thead>
                  <tr>
                    <th style={{ textAlign: 'left', padding: '6px 10px', fontSize: '0.7rem', color: 'rgba(255,255,255,0.4)', fontWeight: '600', width: '220px' }}>Game</th>
                    {[1,2,3,4].map(q => (
                      <th key={q} style={{ textAlign: 'center', padding: '6px 10px', fontSize: '0.7rem', color: 'rgba(255,255,255,0.4)', fontWeight: '600', width: '100px' }}>Q{q}</th>
                    ))}
                    <th style={{ textAlign: 'center', padding: '6px 10px', fontSize: '0.7rem', color: 'rgba(255,255,255,0.4)', fontWeight: '600', width: '80px' }}>Final</th>
                  </tr>
                </thead>
                <tbody>
                  {linked.map((g, gi) => {
                    const absSpread = Math.abs(g.spread);
                    return (
                      <tr key={`t-${gameKey(g)}`} style={{ borderTop: '1px solid rgba(255,255,255,0.08)' }}>
                        <td style={{ padding: '8px 10px', verticalAlign: 'top' }}>
                          <div style={{ display: 'flex', alignItems: 'flex-start', gap: '6px' }}>
                            {gi > 0 && (
                              <button onClick={() => toggleLink(gameKey(g))} style={{
                                background: 'rgba(255,100,100,0.15)',
                                border: '1px solid rgba(255,100,100,0.4)',
                                borderRadius: '4px',
                                color: '#FF6B6B',
                                fontSize: '0.7rem',
                                cursor: 'pointer',
                                padding: '2px 4px',
                                lineHeight: 1,
                                flexShrink: 0,
                                marginTop: '2px',
                              }}>&#x2715;</button>
                            )}
                            <div>
                              <div style={{ fontSize: '0.75rem', color: 'rgba(255,255,255,0.4)' }}>{g.date} R{g.round}G{g.seriesGame}</div>
                              <div style={{ fontSize: '0.85rem', fontWeight: '600', color: '#fff' }}>{g.away} @ {g.home}</div>
                              <div style={{ fontSize: '0.85rem', fontWeight: '600', color: '#fff' }}>O/U {g.totalLine || '—'}</div>
                            </div>
                          </div>
                        </td>
                        {[0,1,2,3].map(qi => {
                          const q = g.quarters[qi];
                          if (!q) return <td key={qi} style={{ textAlign: 'center', padding: '8px', color: 'rgba(255,255,255,0.2)' }}>—</td>;
                          const paceColor = q.totalPace != null ? (q.totalPace > 0 ? OVER_COLOR : q.totalPace < 0 ? UNDER_COLOR : 'rgba(255,255,255,0.4)') : 'rgba(255,255,255,0.5)';
                          // Compare pace direction to first game
                          let borderColor = 'transparent';
                          if (gi > 0 && refGame.quarters[qi] && q.totalPace != null && refGame.quarters[qi].totalPace != null) {
                            const refPace = refGame.quarters[qi].totalPace;
                            const sameSide = (q.totalPace > 0 && refPace > 0) || (q.totalPace < 0 && refPace < 0);
                            if (q.totalPace !== 0 && refPace !== 0) {
                              borderColor = sameSide ? '#70AD47' : '#FFD700';
                            }
                          }
                          return (
                            <td key={qi} style={{ textAlign: 'center', padding: '4px', verticalAlign: 'top' }}>
                              <div style={{ padding: '6px', borderRadius: '6px', border: gi > 0 && borderColor !== 'transparent' ? `2px solid ${borderColor}` : '2px solid transparent' }}>
                              <div style={{ fontSize: '0.8rem', color: '#fff' }}>{q.qTotal} pts</div>
                              <div style={{ fontSize: '0.7rem', color: 'rgba(255,255,255,0.5)' }}>{q.runTotal} total</div>
                              {g.totalLine && q.totalPace != null && (
                                <div style={{ fontSize: '0.6rem', fontWeight: '600', color: paceColor }}>
                                  {q.totalPace > 0 ? '+' : ''}{q.totalPace.toFixed(1)} pace
                                </div>
                              )}
                              </div>
                            </td>
                          );
                        })}
                        <td style={{ textAlign: 'center', padding: '8px', verticalAlign: 'top' }}>
                          {g.isComplete ? (
                            <div>
                              <div style={{ fontSize: '0.85rem', fontWeight: '700', color: '#fff' }}>{g.finalTotal}</div>
                              {g.totalLine ? (
                                <div style={{
                                  fontSize: '0.65rem',
                                  fontWeight: '600',
                                  color: g.finalTotal > g.totalLine ? OVER_COLOR : g.finalTotal < g.totalLine ? UNDER_COLOR : 'rgba(255,255,255,0.4)',
                                }}>
                                  {g.finalTotal > g.totalLine ? 'OVER' : g.finalTotal < g.totalLine ? 'UNDER' : 'PUSH'} {Math.abs(g.finalTotal - g.totalLine).toFixed(1)}
                                </div>
                              ) : null}
                            </div>
                          ) : <span style={{ color: 'rgba(255,255,255,0.2)' }}>—</span>}
                        </td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>
            </>);
            })()}
          </div>
        );
      })()}

      {/* Incomplete Games (no Q4 score) */}
      {(() => {
        const incompleteGames = filteredGames.filter(g => g.quarters.length < 4);
        if (incompleteGames.length === 0) return null;
        return (
          <Collapsible title="In Progress / Upcoming" subtitle={`${incompleteGames.length} games`} defaultOpen={true} level={0}
            onLinkGames={() => setLinkedGameKeys(prev => { const next = new Set(prev); incompleteGames.forEach(g => next.add(gameKey(g))); return next; })} linkCount={incompleteGames.length}>
            {incompleteGames.map(g => (
              <div key={gameKey(g)} style={{ marginBottom: '10px' }}>
                <GameCard game={g} allGames={games} filters={patternFilters} isLinked={linkedGameKeys.has(gameKey(g))} onToggleLink={toggleLink} testScores={testScores} onUpdateTestScore={updateTestScore} onClearTestScores={clearTestScores} />
              </div>
            ))}
          </Collapsible>
        );
      })()}

      {/* Game Cards - grouped by Season > Round > Series */}
      {(() => {
        // Group completed games by season (year), round, then series (matchup)
        const completedGames = filteredGames.filter(g => g.quarters.length >= 4);
        const latestYear = completedGames.length > 0 ? Math.max(...completedGames.map(g => parseInt(g.date.slice(0, 4)))) : 0;
        const byYear = {};
        for (const g of completedGames) {
          const y = parseInt(g.date.slice(0, 4));
          if (!byYear[y]) byYear[y] = [];
          byYear[y].push(g);
        }
        const years = Object.keys(byYear).map(Number).sort((a, b) => b - a);

        return years.map(year => {
          const yearGames = byYear[year];
          // Group by round
          const byRound = {};
          for (const g of yearGames) {
            if (!byRound[g.round]) byRound[g.round] = [];
            byRound[g.round].push(g);
          }
          const rounds = Object.keys(byRound).map(Number).sort();

          return (
            <Collapsible key={year} title={`${year} Playoffs`} subtitle={`${yearGames.length} games`} defaultOpen={year === latestYear} level={0}
              onLinkGames={() => setLinkedGameKeys(prev => { const next = new Set(prev); yearGames.forEach(g => next.add(gameKey(g))); return next; })} linkCount={yearGames.length}>
              {rounds.map(round => {
                const roundGames = byRound[round];
                // Group by series (unordered team pair)
                const bySeries = {};
                for (const g of roundGames) {
                  const sk = [g.away, g.home].sort().join(' vs ');
                  if (!bySeries[sk]) bySeries[sk] = [];
                  bySeries[sk].push(g);
                }
                const seriesKeys = Object.keys(bySeries).sort();

                return (
                  <Collapsible key={round} title={ROUND_NAMES[round] || `Round ${round}`} subtitle={`${roundGames.length} games`} defaultOpen={year === latestYear} level={1}
                    onLinkGames={() => setLinkedGameKeys(prev => { const next = new Set(prev); roundGames.forEach(g => next.add(gameKey(g))); return next; })} linkCount={roundGames.length}>
                    {seriesKeys.map(sk => {
                      const seriesGames = bySeries[sk].sort((a, b) => a.date.localeCompare(b.date) || a.seriesGame - b.seriesGame);
                      return (
                        <Collapsible key={sk} title={sk} subtitle={`${seriesGames.length} games`} defaultOpen={year === latestYear} level={2}
                          onLinkGames={() => setLinkedGameKeys(prev => { const next = new Set(prev); seriesGames.forEach(g => next.add(gameKey(g))); return next; })} linkCount={seriesGames.length}>
                          {seriesGames.map(g => (
                            <div key={gameKey(g)} style={{ marginBottom: '10px' }}>
                              <GameCard game={g} allGames={games} filters={patternFilters} isLinked={linkedGameKeys.has(gameKey(g))} onToggleLink={toggleLink} testScores={testScores} onUpdateTestScore={updateTestScore} onClearTestScores={clearTestScores} />
                            </div>
                          ))}
                        </Collapsible>
                      );
                    })}
                  </Collapsible>
                );
              })}
            </Collapsible>
          );
        });
      })()}

      {/* Footer */}
      <div style={{ textAlign: 'center', marginTop: '40px', padding: '20px', color: 'rgba(255,255,255,0.3)', fontSize: '0.75rem' }}>
        Box Score Patterns &bull; Playoff games only &bull; Data from nba_schedule
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
