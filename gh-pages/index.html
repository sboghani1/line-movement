<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fade Finder - Capper Consensus Tracker</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', system-ui, sans-serif; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
const { useState, useMemo, useEffect, useCallback, useRef, memo } = React;

const STORAGE_KEY = 'fade-finder-picks-data';

function classifyPick(pick, gameSpread) {
  const line = (pick.line || '').toString().trim().toUpperCase();
  if (/^O\s?\d/.test(line)) return 'Over';
  if (/^U\s?\d/.test(line)) return 'Under';
  const spread = (gameSpread || pick.spread || '').trim();
  const side = (pick.side || pick.pick || '').trim();
  if (spread && /[a-zA-Z]/.test(spread) && /\d/.test(spread)) {
    const spreadLower = spread.toLowerCase();
    const sideLower = side.toLowerCase();
    const sideTokens = sideLower.split(/\s+/).filter(w => w.length > 2);
    const sideFound = sideTokens.some(token => spreadLower.indexOf(token) !== -1);
    if (sideFound) {
      const sideIsFav = sideTokens.some(token => {
        const idx = spreadLower.indexOf(token);
        if (idx === -1) return false;
        return /\s*-\d/.test(spreadLower.slice(idx + token.length));
      });
      return sideIsFav ? 'Fav' : 'Dog';
    } else {
      if (/-\d/.test(spread)) return 'Dog';
      if (/\+\d/.test(spread)) return 'Fav';
      return null;
    }
  }
  if (line === 'ML') return null;
  const m = line.match(/^([+-]?\d+\.?\d*)/);
  if (m) return parseFloat(m[1]) < 0 ? 'Fav' : 'Dog';
  return null;
}

function formatRecord(r) { return r ? `${r.wins}-${r.losses}${r.pushes>0?`-${r.pushes}`:''}` : '0-0'; }
function formatLast20(r) { return r && r.last20.length > 0 ? r.last20.join('') : ''; }
function getBetTypeLabel(bt) { return {Fav:'Fav',Dog:'Dog',Over:'Over',Under:'Under'}[bt]||bt; }

function getVerboseRatioLabel(h, t, minTotal = 5) {
  if (!h||!t||t<minTotal) return null;
  const r = h/t;
  const BUCKETS = [
    {label:'100x10',exact:true,minTotal:10},{label:'100',exact:true,minTotal:5},
    {label:'95',min:0.95},{label:'90',min:0.90},{label:'85',min:0.85},{label:'80',min:0.80},
    {label:'75',min:0.75},{label:'70',min:0.70},{label:'65',min:0.65},{label:'60',min:0.60},
    {label:'55',min:0.55},{label:'50',min:0.50},
  ];
  for (const b of BUCKETS) {
    if (b.exact) { if (r===1.0&&(!b.minTotal||t>=b.minTotal)) return b.label; }
    else { if (r>=b.min) return b.label; }
  }
  return null;
}

function parseSpread(spread) {
  const m = (spread||'').match(/^(.*?)\s*([+-]\d+\.?\d*)\s*$/);
  if (!m) return {team: (spread||'').toLowerCase().trim(), line: null};
  return {team: m[1].trim().toLowerCase(), line: m[2]};
}
function flipLine(line) {
  if (!line) return null;
  const m = line.match(/^([+-])(\d+\.?\d*)$/);
  if (!m) return line;
  return (m[1]==='+' ? '-' : '+') + m[2];
}
const GENERIC_TEAM_WORDS = new Set(['state','city','united','red','blue','black','white','green','north','south','east','west','new','old','the','and','of','at','in','los','san','las','fc','sc','cf']);

function spreadTeamMatchesSide(spreadTeam, side) {
  const sideL = side.toLowerCase();
  const tokens = spreadTeam.split(/\s+/).filter(w => w.length > 3 && !GENERIC_TEAM_WORDS.has(w));
  const effectiveTokens = tokens.length ? tokens : spreadTeam.split(/\s+/).filter(w => w.length > 2);
  return effectiveTokens.some(token => sideL.includes(token));
}

const VERBOSE_BUCKET_LABELS = ['100x10','100','95','90','85','80','75','70','65','60','55','50'];
const COARSE_LABELS          = ['100x10','100','90','80','70','60','50'];
const COARSE_MAP = {'100x10':'100x10','100':'100','95':'90','90':'90','85':'80','80':'80','75':'70','70':'70','65':'60','60':'60','55':'50','50':'50'};

// Merge verbose bucket data into coarse buckets by summing wins/losses
function mergeToCoarse(data) {
  if (!data) return null;
  const merged = {};
  for (const [label, d] of Object.entries(data)) {
    const coarseKey = COARSE_MAP[label] || label;
    if (!COARSE_LABELS.includes(coarseKey)) continue;
    if (!merged[coarseKey]) merged[coarseKey] = { wins: 0, losses: 0 };
    merged[coarseKey].wins   += d.wins   || 0;
    merged[coarseKey].losses += d.losses || 0;
  }
  return Object.keys(merged).length > 0 ? merged : null;
}
function sumRecord(data) {
  if (!data) return null;
  let wins = 0, losses = 0;
  for (const d of Object.values(data)) { wins += d.wins||0; losses += d.losses||0; }
  return wins+losses > 0 ? {wins, losses} : null;
}
function resolveActive(verboseLabel, fineBuckets) {
  if (!verboseLabel) return null;
  return fineBuckets ? verboseLabel : (COARSE_MAP[verboseLabel] || verboseLabel);
}

const BET_TYPES  = ['Fav','Dog','Over','Under'];
const OPPOSITE   = {Fav:'Dog',Dog:'Fav',Over:'Under',Under:'Over'};
const SPORT_COLORS = {NBA:{bg:'#1d428a',text:'#fff'},NHL:{bg:'#000',text:'#fff'},CBB:{bg:'#ff6b00',text:'#fff'},NCAAB:{bg:'#ff6b00',text:'#fff'},Tennis:{bg:'#2e7d32',text:'#fff'},Soccer:{bg:'#326295',text:'#fff'},UFC:{bg:'#d20a0a',text:'#fff'},TGL:{bg:'#006400',text:'#fff'},default:{bg:'#333',text:'#fff'}};

function buildGameGroups(picksSubset) {
  const gameGroups = {};
  picksSubset.forEach(pick => {
    if (!pick.result||!pick.game||!pick.capper) return;
    const res = pick.result.toLowerCase();
    if (res!=='win'&&res!=='lose') return;
    const bt = classifyPick(pick, pick.gameSpread); if (!bt) return;
    const key = `${pick.date}-${pick.game}`;
    if (!gameGroups[key]) gameGroups[key] = {sport:pick.sport, cappers:new Set(), Fav:[],Dog:[],Over:[],Under:[]};
    gameGroups[key].cappers.add(pick.capper);
    gameGroups[key][bt].push({res, capper:pick.capper});
  });
  return gameGroups;
}

function applyLabelFn(gameGroups, labelFn) {
  const history = {};
  const addEntry = (key, bt, label, win, cappers) => {
    if (!history[key]) history[key] = {Fav:{},Dog:{},Over:{},Under:{}};
    if (!history[key][bt][label]) history[key][bt][label] = {wins:0, losses:0, games:[]};
    history[key][bt][label].games.push({win, cappers});
    if (win) history[key][bt][label].wins++; else history[key][bt][label].losses++;
  };
  Object.values(gameGroups).forEach(g => {
    const {sport, cappers} = g;
    BET_TYPES.forEach(bt => {
      const opp = OPPOSITE[bt];
      const heavy = g[bt], light = g[opp];
      if (heavy.length <= light.length || heavy.length === 0) return;
      const total = heavy.length + light.length;
      const label = labelFn(heavy.length, total); if (!label) return;
      const wins = heavy.filter(e=>e.res==='win').length;
      const losses = heavy.length - wins;
      if (wins === losses) return;
      const win = wins > losses;
      addEntry('All', bt, label, win, cappers);
      addEntry(sport, bt, label, win, cappers);
      addEntry('All_cappers', bt, label, win, cappers);
      addEntry(`${sport}_cappers`, bt, label, win, cappers);
    });
  });
  return history;
}

function buildRatioHistory(picksSubset, minTotal = 5) {
  const groups = buildGameGroups(picksSubset);
  return applyLabelFn(groups, (h, t) => getVerboseRatioLabel(h, t, minTotal));
}

function filterCapperData(btData, gameCappers) {
  if (!btData) return null;
  const result = {};
  for (const [label, d] of Object.entries(btData)) {
    let wins=0, losses=0;
    for (const g of d.games) {
      if (![...g.cappers].some(c=>gameCappers.has(c))) continue;
      if (g.win) wins++; else losses++;
    }
    if (wins+losses>0) result[label] = {wins, losses};
  }
  return Object.keys(result).length > 0 ? result : null;
}

const InfoIcon = memo(({text}) => {
  const [hovered,setHovered] = useState(false);
  return (
    <span style={{position:'relative',display:'inline-flex',alignItems:'center',marginLeft:'6px'}}>
      <span onMouseEnter={()=>setHovered(true)} onMouseLeave={()=>setHovered(false)}
        style={{display:'inline-flex',alignItems:'center',justifyContent:'center',width:'16px',height:'16px',borderRadius:'50%',background:'rgba(255,255,255,0.2)',border:'1px solid rgba(255,255,255,0.4)',fontSize:'0.65rem',fontWeight:'700',cursor:'help',color:'#fff',flexShrink:0}}>ℹ</span>
      {hovered && <div style={{position:'absolute',top:'22px',left:0,zIndex:200,background:'#1a1a2e',border:'1px solid rgba(255,255,255,0.3)',borderRadius:'8px',padding:'10px 14px',fontSize:'0.72rem',color:'rgba(255,255,255,0.9)',width:'300px',boxShadow:'0 4px 20px rgba(0,0,0,0.6)',lineHeight:'1.6',fontWeight:'400'}}>{text}</div>}
    </span>
  );
});

const ConsensusLabel = memo(({game}) => {
  const [hovered,setHovered] = useState(false);
  if (!game.consensusSide) return null;
  return (
    <div style={{position:'relative',display:'inline-flex',alignItems:'center',gap:'6px'}}>
      <span style={{padding:'4px 12px',background:'rgba(255,255,255,0.2)',borderRadius:'6px',fontSize:'0.85rem',fontWeight:'600',color:'#fff',border:'1px solid rgba(255,255,255,0.4)'}}>
        📊 {game.consensusSide}{game.consensusLine ? <span style={{opacity:0.85,fontWeight:'500'}}> {game.consensusLine}</span> : ''} <span style={{opacity:0.75,fontWeight:'400'}}>({game.consensusSideCount}/{game.consensusTotalCappers} · {game.consensusRatio}%)</span>
      </span>
      <span onMouseEnter={()=>setHovered(true)} onMouseLeave={()=>setHovered(false)}
        style={{display:'inline-flex',alignItems:'center',justifyContent:'center',width:'18px',height:'18px',borderRadius:'50%',background:'rgba(255,255,255,0.25)',border:'1px solid rgba(255,255,255,0.5)',fontSize:'0.7rem',fontWeight:'700',cursor:'help',color:'#fff',flexShrink:0}}>ℹ</span>
      {hovered && <div style={{position:'absolute',top:'28px',left:0,zIndex:100,background:'#1a1a2e',border:'1px solid rgba(255,255,255,0.3)',borderRadius:'8px',padding:'10px 14px',fontSize:'0.75rem',color:'rgba(255,255,255,0.9)',width:'280px',boxShadow:'0 4px 20px rgba(0,0,0,0.5)',lineHeight:'1.6'}}>
        <strong style={{color:'#FFD700'}}>📊 Consensus Side</strong><br/>Spread from spread column. Ratio shows how many cappers are on the majority side.
      </div>}
    </div>
  );
});

const RangeTotal = memo(({rec, color}) => {
  const p = Math.round(rec.wins/(rec.wins+rec.losses)*100);
  return <span style={{marginLeft:'auto',fontSize:'0.58rem',fontWeight:'700',color,whiteSpace:'nowrap',paddingLeft:'4px'}}>{rec.wins}-{rec.losses} ({p}%)</span>;
});

const RatioRows = memo(({data, activeBucket, fadeBucket, bucketList, activeRange, fadeRange, activeIdx, fadeIdx, activeRangeRec, fadeRangeRec, aLo: aLoProp, aHi: aHiProp, fLo: fLoProp, fHi: fHiProp}) => {
  const anchorIdx = activeIdx !== undefined ? activeIdx : (activeBucket ? bucketList.findIndex(l=>String(l)===String(activeBucket)) : -1);
  const fadeIdxR  = fadeIdx   !== undefined ? fadeIdx   : (fadeBucket   ? bucketList.findIndex(l=>String(l)===String(fadeBucket))   : -1);
  const aRange = activeRange || {up:0, down:0};
  const fRange = fadeRange   || {up:0, down:0};
  const aLo = aLoProp !== undefined ? aLoProp : (anchorIdx>=0 ? Math.max(0, anchorIdx-aRange.up)                : -1);
  const aHi = aHiProp !== undefined ? aHiProp : (anchorIdx>=0 ? Math.min(bucketList.length-1, anchorIdx+aRange.down) : -1);
  const fLo = fLoProp !== undefined ? fLoProp : (fadeIdxR>=0  ? Math.max(0, fadeIdxR-fRange.up)                 : -1);
  const fHi = fHiProp !== undefined ? fHiProp : (fadeIdxR>=0  ? Math.min(bucketList.length-1, fadeIdxR+fRange.down)  : -1);

  return bucketList.map((label, idx) => {
    const d = data?.[label];
    const isActive = anchorIdx>=0 && idx>=aLo && idx<=aHi;
    const isFade   = !isActive && fadeIdxR>=0 && idx>=fLo && idx<=fHi;
    const isAnchorRow = idx === anchorIdx;
    const isFadeRow   = !isAnchorRow && idx === fadeIdxR;
    const winRate = d && d.wins+d.losses>0 ? (d.wins/(d.wins+d.losses)*100).toFixed(0) : null;

    // Unified group border: only draw top on first row of group, bottom on last, sides always
    const isGroupFirst = isActive ? idx===aLo : isFade ? idx===fLo : false;
    const isGroupLast  = isActive ? idx===aHi : isFade ? idx===fHi : false;
    const groupColor   = isActive ? 'rgba(255,200,0,0.7)' : isFade ? 'rgba(100,180,255,0.65)' : 'transparent';
    const borderTop    = (isActive||isFade) && isGroupFirst  ? `2px solid ${groupColor}` : (isActive||isFade) ? '2px solid transparent' : 'none';
    const borderBottom = (isActive||isFade) && isGroupLast   ? `2px solid ${groupColor}` : (isActive||isFade) ? '1px solid rgba(255,255,255,0.07)' : '1px solid rgba(255,255,255,0.07)';
    const borderSides  = (isActive||isFade) ? `2px solid ${groupColor}` : '2px solid transparent';
    const borderRadius = (isActive||isFade) ? (isGroupFirst&&isGroupLast?'4px':isGroupFirst?'4px 4px 0 0':isGroupLast?'0 0 4px 4px':'0') : '0';

    return (
      <div key={label} style={{
        fontSize:'0.65rem',display:'flex',alignItems:'center',gap:'4px',
        padding:'1px 3px',minHeight:'16px',boxSizing:'border-box',
        borderTop, borderBottom,
        borderLeft: borderSides, borderRight: borderSides,
        borderRadius,
        background: isActive ? 'rgba(255,200,0,0.10)' : isFade ? 'rgba(100,180,255,0.07)' : 'transparent',
        opacity: (isActive||isFade) ? 1 : 0.85,
      }}>
        <span style={{width:'46px',flexShrink:0,color:isAnchorRow?'rgba(255,200,0,0.9)':isActive?'rgba(255,200,0,0.7)':isFadeRow?'rgba(100,180,255,0.9)':isFade?'rgba(100,180,255,0.7)':'rgba(255,255,255,0.6)',fontWeight:(isActive||isFade)?'700':'400',fontFamily:'monospace'}}>{label}</span>
        {d
          ? <>
              <span style={{color:isActive?(d.wins>d.losses?'#90EE90':d.losses>d.wins?'#FF6B6B':'#fff'):isFade?(d.wins>d.losses?'#90EE90':d.losses>d.wins?'#FF6B6B':'#fff'):'rgba(255,255,255,0.85)',fontWeight:(isActive||isFade)?'700':'400',minWidth:'42px',flexShrink:0,textAlign:'right',whiteSpace:'nowrap'}}>{d.wins}-{d.losses}</span>
              <span style={{color:(isActive||isFade)?'rgba(255,255,255,0.8)':'rgba(255,255,255,0.45)',fontSize:'0.6rem',minWidth:'34px',flexShrink:0,textAlign:'right',whiteSpace:'nowrap'}}>({winRate}%)</span>
            </>
          : <span style={{color:'rgba(255,255,255,0.18)',fontSize:'0.6rem'}}>—</span>
        }
        {isGroupLast && isActive && activeRangeRec && aHi > aLo && <RangeTotal rec={activeRangeRec} color='rgba(255,200,0,0.8)'/>}
        {isGroupLast && isFade   && fadeRangeRec   && fHi > fLo   && <RangeTotal rec={fadeRangeRec}   color='rgba(100,180,255,0.8)'/>}
      </div>
    );
  });
});

const ThisGameBadge = memo(({ratio}) => {
  if (!ratio?.label) return null;
  return (
    <div style={{fontSize:'0.7rem',color:'#FFD700',fontWeight:'700',marginBottom:'6px',padding:'3px 8px',background:'rgba(255,215,0,0.15)',borderRadius:'4px',borderLeft:'2px solid #FFD700',display:'inline-flex',gap:'6px',alignItems:'center'}}>
      <span>➤ This game:</span>
      <span>{ratio.label} ({ratio.count}/{ratio.total} · {Math.round(ratio.count/ratio.total*100)}%)</span>
    </div>
  );
});

const CapperRatioHistory = memo(({game, ratioHistory, ratioHistoryL30, l30Days, minPicks, sectionSetters, gameRanges, setBucketRanges}) => {
  const [open,setOpen] = useState(true);
  const [fineBuckets,setFineBuckets] = useState(false);
  const [expandedBt,setExpandedBt] = useState({Fav:false,Dog:false,Over:true,Under:true});

  useEffect(() => {
    sectionSetters.current[game.game] = setOpen;
    return () => { delete sectionSetters.current[game.game]; };
  }, [game.game, sectionSetters]);

  const bucketList = fineBuckets ? VERBOSE_BUCKET_LABELS : COARSE_LABELS;
  const currentGameRatios = game.currentRatios;
  const gameCappers = useMemo(() => new Set(game.picks.map(p=>p.capper)), [game.picks]);

  const getFiltered    = useCallback((histKey, bt) => filterCapperData(ratioHistory[histKey]?.[bt],    gameCappers), [ratioHistory,    gameCappers]);
  const getFilteredL30 = useCallback((histKey, bt) => filterCapperData(ratioHistoryL30[histKey]?.[bt], gameCappers), [ratioHistoryL30, gameCappers]);

  const relevantBetTypes = useMemo(() => {
    const s = new Set();
    BET_TYPES.forEach(bt => { if (currentGameRatios[bt]?.verboseLabel) s.add(bt); });
    return s;
  }, [currentGameRatios]);

  const toggleBt = useCallback(bt => setExpandedBt(p=>({...p,[bt]:!p[bt]})), []);

  const adjustRange = useCallback((rangeKey, dir, delta) => {
    setBucketRanges(prev => {
      const prevGame = prev[game.game] || {};
      const prevRange = prevGame[rangeKey] || {up:0, down:0};
      const next = {...prevRange, [dir]: Math.max(0, prevRange[dir]+delta)};
      return {...prev, [game.game]: {...prevGame, [rangeKey]: next}};
    });
  }, [game.game, setBucketRanges]);

  const btnStyle = useCallback((color) => ({
    background:'none', border:`1px solid ${color}`, borderRadius:'3px',
    cursor:'pointer', fontSize:'0.55rem', fontWeight:'900', color, lineHeight:1,
    padding:'1px 4px', flexShrink:0,
  }), []);

  const calcRangeRecord = useCallback((resolvedData, anchorIdx, rng) => {
    if (anchorIdx < 0 || !resolvedData) return null;
    const lo = Math.max(0, anchorIdx - rng.up);
    const hi = Math.min(bucketList.length-1, anchorIdx + rng.down);
    let w=0, l=0;
    for (let i=lo; i<=hi; i++) { const d=resolvedData[bucketList[i]]; if(d){w+=d.wins||0;l+=d.losses||0;} }
    return w+l>0 ? {wins:w, losses:l} : null;
  }, [bucketList]);

  const calcSideRecord = useCallback((resolvedData, anchorIdx, rng, dir) => {
    if (anchorIdx < 0 || !resolvedData) return null;
    const lo = Math.max(0, anchorIdx - rng.up);
    const hi = Math.min(bucketList.length-1, anchorIdx + rng.down);
    const from = dir==='above' ? 0    : hi+1;
    const to   = dir==='above' ? lo-1 : bucketList.length-1;
    if (from > to) return null;
    let w=0, l=0;
    for (let i=from; i<=to; i++) { const d=resolvedData[bucketList[i]]; if(d){w+=d.wins||0;l+=d.losses||0;} }
    return w+l>0 ? {wins:w, losses:l} : null;
  }, [bucketList]);

  const hasAny = BET_TYPES.some(bt => {
    const sp = game.sport;
    return ratioHistory[sp]?.[bt] || ratioHistory['All']?.[bt] || currentGameRatios[bt]?.verboseLabel;
  });
  if (!hasAny) return null;

  return (
    <div style={{borderBottom:'1px solid rgba(0,33,165,0.4)'}}>
      <div style={{display:'flex',alignItems:'center',background:'rgba(0,0,0,0.15)'}}>
        <button onClick={()=>setOpen(o=>!o)}
          style={{flex:1,display:'flex',alignItems:'center',gap:'8px',padding:'10px 20px',background:'none',border:'none',cursor:'pointer',color:'#BB8FCE',fontSize:'0.75rem',fontWeight:'700',textAlign:'left'}}>
          <span style={{fontSize:'0.6rem',display:'inline-block',transform:open?'rotate(90deg)':'rotate(0deg)',transition:'transform 0.2s'}}>▶</span>
          📈 CAPPER RATIO HISTORY
          <InfoIcon text={`When X% of cappers agreed on a side, how did it go? Only games with ≥${minPicks} total picks counted. ➤ marks this game's bucket.`}/>
        </button>
        <div style={{display:'flex',gap:'3px',padding:'6px 16px'}}>
          {[['10%',false],['5%',true]].map(([label,val]) => (
            <button key={label} onClick={()=>setFineBuckets(val)}
              style={{padding:'4px 10px',borderRadius:'4px',border:`1px solid ${fineBuckets===val?'rgba(255,215,0,0.6)':'rgba(255,255,255,0.15)'}`,cursor:'pointer',fontSize:'0.7rem',fontWeight:'700',
                background:fineBuckets===val?'rgba(255,215,0,0.2)':'rgba(255,255,255,0.05)',
                color:fineBuckets===val?'#FFD700':'rgba(255,255,255,0.4)',transition:'all 0.15s'}}>
              {label}
            </button>
          ))}
        </div>
      </div>

      {open && <div style={{padding:'12px 20px'}}>
        {BET_TYPES.map(bt => {
          const cr         = currentGameRatios[bt];
          const isRelevant = relevantBetTypes.has(bt);
          const isExpanded = !!expandedBt[bt];
          const sp = game.sport;

          const sd   = ratioHistory[sp]?.[bt];
          const scf  = getFiltered(`${sp}_cappers`, bt);
          const ad   = ratioHistory['All']?.[bt];
          const acf  = getFiltered('All_cappers', bt);
          const sdL  = ratioHistoryL30[sp]?.[bt];
          const scfL = getFilteredL30(`${sp}_cappers`, bt);
          const adL  = ratioHistoryL30['All']?.[bt];
          const acfL = getFilteredL30('All_cappers', bt);

          const allTimeSections = [
            {key:'sport',    label:`${bt} ${sp}`,         data:sd,  has:!!(sd&&Object.keys(sd).length), isL30:false},
            {key:'sportCap', label:`${bt} ${sp} Cappers`, data:scf, has:!!scf,                          isL30:false},
            {key:'all',      label:`${bt} All`,           data:ad,  has:!!(ad&&Object.keys(ad).length), isL30:false},
            {key:'allCap',   label:`${bt} All Cappers`,   data:acf, has:!!acf,                          isL30:false},
          ];
          const l30Sections = [
            {key:'sport_l',    label:`[L${l30Days}] ${bt} ${sp}`,     data:sdL,  has:!!(sdL&&Object.keys(sdL).length), isL30:true},
            {key:'sportCap_l', label:`[L${l30Days}] ${bt} ${sp} Cap`, data:scfL, has:!!scfL,                           isL30:true},
            {key:'all_l',      label:`[L${l30Days}] ${bt} All`,       data:adL,  has:!!(adL&&Object.keys(adL).length), isL30:true},
            {key:'allCap_l',   label:`[L${l30Days}] ${bt} All Cap`,   data:acfL, has:!!acfL,                           isL30:true},
          ];
          const allSections = [...allTimeSections, ...l30Sections];

          if (!allSections.some(s=>s.has) && !cr?.verboseLabel) return null;

          const oppCr        = currentGameRatios[OPPOSITE[bt]];
          const fadeBucketVal = resolveActive(oppCr?.verboseLabel, fineBuckets);
          const activeBucketVal = resolveActive(cr?.verboseLabel, fineBuckets);

          return (
            <div key={bt} style={{marginBottom:'8px'}}>
              <button onClick={()=>toggleBt(bt)}
                style={{display:'flex',alignItems:'center',gap:'6px',background:'none',border:'none',cursor:'pointer',padding:'2px 0',
                  color:isRelevant?'#FFD700':'#BB8FCE',fontSize:'0.7rem',fontWeight:'700'}}>
                <span style={{fontSize:'0.55rem',display:'inline-block',transform:isExpanded?'rotate(90deg)':'rotate(0deg)',transition:'transform 0.15s'}}>▶</span>
                {bt} {sp}
              </button>

              {isExpanded && <div style={{marginTop:'4px',marginLeft:'12px'}}>
                {cr?.verboseLabel && <ThisGameBadge ratio={{...cr, label:cr.verboseLabel}}/>}
                <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:'8px',marginTop:'4px'}}>
                  {allSections.map(sec => {
                    const resolvedData = fineBuckets ? sec.data : mergeToCoarse(sec.data);
                    const tot    = sumRecord(resolvedData);
                    const totPct = tot ? Math.round(tot.wins/(tot.wins+tot.losses)*100) : null;

                    const rangeKey   = `${bt}-${sec.key}`;
                    const range      = gameRanges[rangeKey] || {up:0, down:0};
                    const activeIdx  = activeBucketVal != null ? bucketList.findIndex(l=>String(l)===String(activeBucketVal)) : -1;
                    const fadeIdx    = fadeBucketVal   != null ? bucketList.findIndex(l=>String(l)===String(fadeBucketVal))   : -1;

                    const activeRangeRec = calcRangeRecord(resolvedData, activeIdx, range);
                    const fadeRangeRec   = calcRangeRecord(resolvedData, fadeIdx,   range);
                    const aboveRec       = calcSideRecord(resolvedData, activeIdx, range, 'above');
                    const belowRec       = calcSideRecord(resolvedData, activeIdx, range, 'below');
                    const aboveFadeRec   = calcSideRecord(resolvedData, fadeIdx,   range, 'above');
                    const belowFadeRec   = calcSideRecord(resolvedData, fadeIdx,   range, 'below');

                    const hasAnchor    = activeIdx >= 0 || fadeIdx >= 0;
                    const mainIdx      = activeIdx >= 0 ? activeIdx : fadeIdx;
                    const curLo        = mainIdx >= 0 ? Math.max(0, mainIdx - range.up)                       : -1;
                    const curHi        = mainIdx >= 0 ? Math.min(bucketList.length-1, mainIdx + range.down)   : -1;
                    const canExpandUp   = mainIdx >= 0 && curLo > 0;
                    const canExpandDown = mainIdx >= 0 && curHi < bucketList.length - 1;
                    const anchorColor  = activeIdx >= 0 ? 'rgba(255,200,0,0.7)' : 'rgba(100,180,255,0.7)';

                    const aLo = activeIdx >= 0 ? Math.max(0, activeIdx - range.up) : -1;
                    const aHi = activeIdx >= 0 ? Math.min(bucketList.length-1, activeIdx + range.down) : -1;
                    const fLo = fadeIdx   >= 0 ? Math.max(0, fadeIdx - range.up)   : -1;
                    const fHi = fadeIdx   >= 0 ? Math.min(bucketList.length-1, fadeIdx + range.down)   : -1;

                    const aboveColor = aboveRec ? 'rgba(255,200,0,0.55)' : 'rgba(100,180,255,0.55)';
                    const aboveR     = aboveRec || aboveFadeRec;
                    const belowColor = belowRec ? 'rgba(255,200,0,0.55)' : 'rgba(100,180,255,0.55)';
                    const belowR     = belowRec || belowFadeRec;

                    return (
                      <div key={sec.key} style={{background:sec.isL30?'rgba(255,215,0,0.04)':'rgba(0,0,0,0.2)',borderRadius:'6px',padding:'8px',border:`1px solid ${sec.isL30?'rgba(255,215,0,0.12)':'rgba(255,255,255,0.08)'}`}}>
                        <div style={{fontSize:'0.65rem',color:'rgba(255,255,255,0.8)',fontWeight:'700',marginBottom:'4px',borderBottom:`1px solid ${sec.isL30?'rgba(255,215,0,0.15)':'rgba(255,255,255,0.1)'}`,paddingBottom:'3px',display:'flex',justifyContent:'space-between',alignItems:'baseline'}}>
                          <span>{sec.label}</span>
                          {tot && <span style={{fontSize:'0.6rem',fontWeight:'600',color:'rgba(255,255,255,0.5)',whiteSpace:'nowrap'}}>{tot.wins}-{tot.losses} ({totPct}%)</span>}
                        </div>
                        {hasAnchor && <div style={{display:'flex',justifyContent:'flex-end',alignItems:'center',gap:'4px',minHeight:'14px',marginBottom:'2px'}}>
                          <div style={{display:'flex',gap:'2px'}}>
                            {range.up>0   && <button onClick={()=>adjustRange(rangeKey,'up',-1)}  style={btnStyle('rgba(255,100,100,0.6)')}>▲</button>}
                            {canExpandUp  && <button onClick={()=>adjustRange(rangeKey,'up',1)}   style={btnStyle(anchorColor)}>▲</button>}
                          </div>
                          {aboveR && <span style={{fontSize:'0.58rem',fontWeight:'600',color:aboveColor,whiteSpace:'nowrap'}}>{aboveR.wins}-{aboveR.losses} ({Math.round(aboveR.wins/(aboveR.wins+aboveR.losses)*100)}%)</span>}
                        </div>}
                        <RatioRows
                          data={resolvedData}
                          activeBucket={activeBucketVal}
                          fadeBucket={fadeBucketVal}
                          bucketList={bucketList}
                          activeRange={range}
                          fadeRange={range}
                          activeIdx={activeIdx}
                          fadeIdx={fadeIdx}
                          activeRangeRec={activeRangeRec}
                          fadeRangeRec={fadeRangeRec}
                          aLo={aLo} aHi={aHi} fLo={fLo} fHi={fHi}
                        />
                        {hasAnchor && <div style={{display:'flex',justifyContent:'flex-end',alignItems:'center',gap:'4px',minHeight:'14px',marginTop:'2px'}}>
                          {belowR && <span style={{fontSize:'0.58rem',fontWeight:'600',color:belowColor,whiteSpace:'nowrap'}}>{belowR.wins}-{belowR.losses} ({Math.round(belowR.wins/(belowR.wins+belowR.losses)*100)}%)</span>}
                          <div style={{display:'flex',gap:'2px'}}>
                            {range.down>0    && <button onClick={()=>adjustRange(rangeKey,'down',-1)} style={btnStyle('rgba(255,100,100,0.6)')}>▼</button>}
                            {canExpandDown   && <button onClick={()=>adjustRange(rangeKey,'down',1)}  style={btnStyle(anchorColor)}>▼</button>}
                          </div>
                        </div>}
                      </div>
                    );
                  })}
                </div>
              </div>}
            </div>
          );
        })}
      </div>}
    </div>
  );
});

function CapperConsensusTracker() {
  const [picks,setPicks] = useState([]);
  const [selectedSport,setSelectedSport] = useState('ALL');
  const [selectedDate,setSelectedDate] = useState(null);
  const [selectedCappers,setSelectedCappers] = useState([]);
  const [capperFilterOpen,setCapperFilterOpen] = useState(false);
  const [l30Input,setL30Input] = useState('30');
  const [l30Days,setL30Days] = useState(30);
  const [minPicksInput,setMinPicksInput] = useState('5');
  const [minPicks,setMinPicks] = useState(5);
  const [minOpponentInput,setMinOpponentInput] = useState('0');
  const [minOpponent,setMinOpponent] = useState(0);
  const [loading,setLoading] = useState(true);
  const [loadError,setLoadError] = useState(null);
  const [lastLoaded,setLastLoaded] = useState(null);
  const [storageStatus,setStorageStatus] = useState('checking');
  // fakeCappers: { [gameName]: { [side]: [{id, capper, sport, date}] } }
  const [fakeCappers, setFakeCappers] = useState({});
  // deletedPicks: { [gameName]: Set of pickKeys }
  const [deletedPicks, setDeletedPicks] = useState({});
  // bucketRanges: { [gameName]: { [secKey]: { up: n, down: n } } }
  const [bucketRanges, setBucketRanges] = useState({});
  const fakeCounter = useRef(0);
  const [refreshState, setRefreshState] = useState('idle'); // idle | loading | success | error
  const [refreshMsg, setRefreshMsg]     = useState('');
  const [refreshCooldown, setRefreshCooldown] = useState(false);
  const refreshTimerRef = useRef(null);
  const sectionSetters = useRef({});

  const capperColors = useMemo(() => ['#FF6B6B','#4ECDC4','#45B7D1','#96CEB4','#FFEAA7','#DDA0DD','#98D8C8','#F7DC6F','#BB8FCE','#85C1E9','#F8B500','#00CED1','#FF69B4','#32CD32','#FF8C00','#9370DB','#20B2AA','#FFB6C1','#87CEEB','#DEB887','#FA8072','#7B68EE','#00FA9A','#FF6347','#4682B4','#D2691E','#6495ED','#DC143C','#00BFFF','#228B22'], []);

  const parseCsv = useCallback((text, setDate) => {
    const lines = text.trim().split('\n'); if (lines.length < 1) return;

    // Parse a single CSV line respecting quoted fields
    const parseLine = (line) => {
      const result = []; let cur = ''; let inQuote = false;
      for (let i = 0; i < line.length; i++) {
        const ch = line[i];
        if (ch === '"') { inQuote = !inQuote; }
        else if (ch === ',' && !inQuote) { result.push(cur.trim()); cur = ''; }
        else { cur += ch; }
      }
      result.push(cur.trim());
      return result;
    };

    // Detect if first row is a header or data
    const firstRow = parseLine(lines[0]);
    const KNOWN_HEADERS = ['date','capper','sport','pick','line','game','spread','side','result'];
    const looksLikeHeader = firstRow.some(v => KNOWN_HEADERS.includes(v.toLowerCase().trim()));

    let headers, dataStartIdx;
    if (looksLikeHeader) {
      headers = firstRow.map(h => h.trim().toLowerCase());
      dataStartIdx = 1;
    } else {
      // No header row — assume standard column order
      headers = KNOWN_HEADERS;
      dataStartIdx = 0;
    }

    const data = [];
    for (let i = dataStartIdx; i < lines.length; i++) {
      const values = parseLine(lines[i]);
      if (values.length >= 4) {
        const row = {};
        headers.forEach((h, idx) => { row[h] = values[idx] || ''; });
        if (row.capper && row.game) data.push(row);
      }
    }
    setPicks(data);
    if (setDate) { const dates=[...new Set(data.map(p=>p.date))].filter(Boolean).sort().reverse(); if(dates.length>0) setSelectedDate(dates[0]); }
  }, []);

  useEffect(() => {
    const load = async () => {
      const isGithubPages = window.location.hostname.includes('github.io');
      if (isGithubPages) {
        try {
          const bust = Math.floor(Date.now() / (5 * 60 * 1000)); const basePath = window.location.pathname.replace(/\/[^\/]*$/, ''); const csvPath = basePath + '/data/master_sheet.csv?v=' + bust; const res = await fetch(csvPath);
          if (!res.ok) throw new Error(`HTTP ${res.status}`);
          parseCsv(await res.text(), true);
          setLastLoaded('Loaded from ' + csvPath);
          setStorageStatus('loaded');
        } catch(err) {
          setLoadError('Failed to load master_sheet.csv: '+err.message);
          setStorageStatus('empty');
        } finally { setLoading(false); }
        return;
      }
      try {
        const result = await window.storage.get(STORAGE_KEY, true);
        if (result?.value) {
          const s = JSON.parse(result.value);
          // Re-parse to catch previously broken headerless CSVs
          parseCsv(s.csv, true);
          setLastLoaded(s.savedAt || 'Previously saved');
          setStorageStatus('loaded');
        } else setStorageStatus('empty');
      } catch { setStorageStatus('empty'); } finally { setLoading(false); }
    };
    load();
  }, [parseCsv]);

  const saveToStorage = useCallback(async csv => {
    try { await window.storage.set(STORAGE_KEY, JSON.stringify({csv, savedAt:new Date().toLocaleString()}), true); setStorageStatus('saved'); return true; }
    catch(err) { setLoadError('Failed to save: '+err.message); return false; }
  }, []);

  const clearStorage = useCallback(async () => {
    try { await window.storage.delete(STORAGE_KEY, true); setPicks([]); setLastLoaded(null); setStorageStatus('empty'); setFakeCappers({}); setDeletedPicks({}); } catch {}
  }, []);

  const handleFileUpload = useCallback(e => {
    const file = e.target.files[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = async ev => { const text=ev.target.result; parseCsv(text,true); const saved=await saveToStorage(text); setLastLoaded(new Date().toLocaleString()+(saved?' ✓ saved':' (not saved)')); };
    reader.readAsText(file);
  }, [parseCsv, saveToStorage]);

  const handleAddFake = useCallback((gameName, side, sport, date) => {
    fakeCounter.current += 1;
    const id = `fake_${fakeCounter.current}`;
    const capperName = `fake_capper_${fakeCounter.current}`;
    setFakeCappers(prev => {
      const game = prev[gameName] || {};
      const sideFakes = game[side] || [];
      return { ...prev, [gameName]: { ...game, [side]: [...sideFakes, {id, capper:capperName, sport, side, game:gameName}] } };
    });
  }, []);

  const handleRemoveFake = useCallback((gameName, side, id) => {
    setFakeCappers(prev => {
      const game = prev[gameName] || {};
      const sideFakes = (game[side] || []).filter(f=>f.id!==id);
      return { ...prev, [gameName]: { ...game, [side]: sideFakes } };
    });
  }, []);

  const handleDeletePick = useCallback((gameName, pickKey) => {
    setDeletedPicks(prev => {
      const s = new Set(prev[gameName] || []);
      s.add(pickKey);
      return { ...prev, [gameName]: s };
    });
  }, []);

  const handleRestorePick = useCallback((gameName, pickKey) => {
    setDeletedPicks(prev => {
      const s = new Set(prev[gameName] || []);
      s.delete(pickKey);
      return { ...prev, [gameName]: s };
    });
  }, []);

  const handleResetGame = useCallback((gameName) => {
    setDeletedPicks(prev => { const n={...prev}; delete n[gameName]; return n; });
    setFakeCappers(prev => { const n={...prev}; delete n[gameName]; return n; });
    setBucketRanges(prev => { const n={...prev}; delete n[gameName]; return n; });
  }, []);

  const fakePicks = useMemo(() => {
    const result = [];
    Object.values(fakeCappers).forEach(gameObj => {
      Object.values(gameObj).forEach(sideFakes => {
        sideFakes.forEach(f => {
          result.push({...f, result:'', line:'', spread:'', pick:f.side, date: selectedDate || ''});
        });
      });
    });
    return result;
  }, [fakeCappers, selectedDate]);

  const capperMap = useMemo(() => {
    const unique = [...new Set(picks.map(p=>p.capper))].filter(Boolean).sort();
    const map = {}; unique.forEach((c,i) => { map[c]={color:capperColors[i%capperColors.length]}; }); return map;
  }, [picks, capperColors]);

  const sports     = useMemo(() => ['ALL',...[...new Set(picks.map(p=>p.sport))].filter(s=>s&&!s.toUpperCase().startsWith('NCAA')).sort()], [picks]);
  const dates      = useMemo(() => [...new Set(picks.map(p=>p.date))].filter(Boolean).sort().reverse(), [picks]);
  const allCappers = useMemo(() => [...new Set(picks.map(p=>p.capper))].filter(Boolean).sort(), [picks]);
  const toggleCapper = useCallback(c => setSelectedCappers(prev => prev.includes(c)?prev.filter(x=>x!==c):[...prev,c]), []);

  const getCapperRecords = useMemo(() => {
    const records = {};
    picks.forEach(pick => {
      if (!pick.result||!pick.capper) return;
      const bt=classifyPick(pick, pick.spread); if (!bt) return;
      const {capper,sport,result} = pick, r=result.toLowerCase();
      if (!records[capper]) records[capper]={all:{},bySport:{}};
      if (!records[capper].all[bt]) records[capper].all[bt]={wins:0,losses:0,pushes:0,last20:[]};
      if (!records[capper].bySport[sport]) records[capper].bySport[sport]={};
      if (!records[capper].bySport[sport][bt]) records[capper].bySport[sport][bt]={wins:0,losses:0,pushes:0,last20:[]};
      const aR=records[capper].all[bt], sR=records[capper].bySport[sport][bt];
      if (r==='win'){aR.wins++;sR.wins++;aR.last20.push('w');sR.last20.push('w');}
      else if (r==='lose'){aR.losses++;sR.losses++;aR.last20.push('l');sR.last20.push('l');}
      else if (r==='push'){aR.pushes++;sR.pushes++;aR.last20.push('_');sR.last20.push('_');}
      if (aR.last20.length>20) aR.last20=aR.last20.slice(-20);
      if (sR.last20.length>20) sR.last20=sR.last20.slice(-20);
    });
    return records;
  }, [picks]);

  const ratioHistory = useMemo(() => buildRatioHistory(picks, minPicks), [picks, minPicks]);

  const ratioHistoryL30 = useMemo(() => {
    if (!selectedDate) return {};
    const cutoff = new Date(selectedDate); cutoff.setDate(cutoff.getDate()-l30Days);
    const cutoffStr = cutoff.toISOString().slice(0,10);
    return buildRatioHistory(picks.filter(p=>p.date<selectedDate&&p.date>=cutoffStr), minPicks);
  }, [picks, selectedDate, l30Days, minPicks]);

  const filteredPicks = useMemo(() => picks.filter(p => {
    if (selectedSport!=='ALL'&&p.sport!==selectedSport) return false;
    if (selectedDate&&p.date!==selectedDate) return false;
    return true;
  }), [picks, selectedSport, selectedDate]);

  // Combine real picks (minus deleted) + fake picks
  const allCurrentPicks = useMemo(() => {
    const fakes = fakePicks.filter(f => selectedSport === 'ALL' || f.sport === selectedSport);
    const real = filteredPicks.filter(p => {
      const gameDeleted = deletedPicks[p.game];
      if (!gameDeleted) return true;
      return !gameDeleted.has(p.pickKey || `${p.capper}-${p.side||p.pick}-${p.game}`);
    });
    return [...real, ...fakes];
  }, [filteredPicks, fakePicks, selectedSport, deletedPicks]);

  const gameConsensus = useMemo(() => {
    const games = {};

    // First pass: build from filteredPicks to assign stable pickKeys
    filteredPicks.forEach((pick, idx) => {
      if (!pick.capper || !pick.game) return;
      const gameKey = pick.game||`${pick.pick} game`;
      if (!games[gameKey]) games[gameKey]={game:gameKey,sport:pick.sport,sides:{},picks:[],spread:pick.spread||'',cappers:new Set(),date:pick.date};
      if (pick.spread&&!games[gameKey].spread) games[gameKey].spread=pick.spread;
      const side=pick.side||pick.pick;
      const pickKey = `${pick.capper}-${side}-${gameKey}-${idx}`;
      if (!games[gameKey].sides[side]) games[gameKey].sides[side]={cappers:[],allCappers:[],wins:0,losses:0,winningCappers:[],losingCappers:[]};
      const bt=classifyPick(pick, games[gameKey].spread), capRec=getCapperRecords[pick.capper];
      const capperObj = {capper:pick.capper,line:pick.line,pick:pick.pick,pickKey,capperColor:capperMap[pick.capper]?.color||'#888',betType:bt,sport:pick.sport,sportRecord:capRec?.bySport[pick.sport]?.[bt]||null,allRecord:capRec?.all[bt]||null,result:pick.result?.toLowerCase()||null};
      games[gameKey].sides[side].allCappers.push(capperObj);
    });

    // Second pass: apply deletions + fakes for consensus counts
    Object.values(games).forEach(game => {
      const gameDeleted = deletedPicks[game.game] || new Set();
      const gameFakes = fakeCappers[game.game] || {};

      Object.keys(game.sides).forEach(side => {
        const sd = game.sides[side];
        // Active = not deleted
        sd.cappers = sd.allCappers.filter(c => !gameDeleted.has(c.pickKey));
        sd.wins = 0; sd.losses = 0; sd.winningCappers = []; sd.losingCappers = [];
        sd.cappers.forEach(c => {
          if (c.result==='win'){sd.wins++;sd.winningCappers.push(c.capper);}
          else if (c.result==='lose'){sd.losses++;sd.losingCappers.push(c.capper);}
        });
        // Add fakes
        const sideFakes = gameFakes[side] || [];
        sideFakes.forEach(f => {
          sd.cappers.push({capper:f.capper,line:'',pick:side,pickKey:f.id,capperColor:'rgba(255,200,0,0.7)',betType:null,sport:f.sport,sportRecord:null,allRecord:null,result:null,isFake:true});
        });
        game.cappers = new Set([...sd.cappers.map(c=>c.capper)]);
      });

      // Also add picks to game.picks for ratio history (active only, no fakes)
      game.picks = [];
      Object.entries(game.sides).forEach(([side, sd]) => {
        sd.allCappers.filter(c => !(deletedPicks[game.game]||new Set()).has(c.pickKey)).forEach(c => {
          game.picks.push({capper:c.capper, sport:game.sport, result:c.result, side, game:game.game, spread:game.spread, line:c.line});
        });
      });
    });

    Object.values(games).forEach(game => {
      Object.keys(game.sides).forEach(s=>game.sides[s].allCappers.sort((a,b)=>(a.capper||'').localeCompare(b.capper||'')));
      const sc=Object.entries(game.sides).map(([s,d])=>({side:s,count:d.cappers.length})).sort((a,b)=>b.count-a.count);
      const total=sc.reduce((s,x)=>s+x.count,0), maj=sc[0];
      if (maj) {
        game.consensusSide=maj.side;
        game.consensusRatio=total>0?Math.round((maj.count/total)*100):0;
        game.consensusTotalCappers=total;
        game.consensusSideCount=maj.count;
        const {team: spreadTeam, line: spreadLine} = parseSpread(game.spread);
        if (spreadLine) {
          game.consensusLine = spreadTeamMatchesSide(spreadTeam, maj.side) ? spreadLine : flipLine(spreadLine);
        } else { game.consensusLine = null; }
      }
      const ratios = {Fav:null,Dog:null,Over:null,Under:null};
      if (maj && maj.count > (total - maj.count)) {
        let bt = null;
        if (game.consensusLine) {
          bt = game.consensusLine.startsWith('-') ? 'Fav' : 'Dog';
        } else {
          bt = classifyPick({side:maj.side, line:'', spread:''}, game.spread);
        }
        if (bt) {
          ratios[bt] = {verboseLabel: getVerboseRatioLabel(maj.count, total, minPicks), count:maj.count, total};
          ratios[OPPOSITE[bt]] = {verboseLabel:null};
        }
      }
      game.currentRatios = ratios;
    });

    let filtered=Object.values(games);
    if (selectedCappers.length>0) filtered=filtered.filter(g=>selectedCappers.some(c=>g.cappers.has(c)));
    if (minOpponent>0) filtered=filtered.filter(g=>{
      const sides=Object.values(g.sides).map(s=>s.cappers.length).sort((a,b)=>b-a);
      return sides.length>=2 && sides[1]>=minOpponent;
    });
    return filtered.sort((a,b)=>b.picks.length-a.picks.length);
  }, [filteredPicks, fakeCappers, deletedPicks, capperMap, selectedCappers, getCapperRecords, minPicks, minOpponent]);

  const applyL30      = useCallback(() => { const v=parseInt(l30Input);      if(!isNaN(v)&&v>0)  setL30Days(v);  }, [l30Input]);
  const applyMinPicks    = useCallback(() => { const v=parseInt(minPicksInput);    if(!isNaN(v)&&v>=1)  setMinPicks(v);    }, [minPicksInput]);
  const applyMinOpponent = useCallback(() => { const v=parseInt(minOpponentInput); if(!isNaN(v)&&v>=0)  setMinOpponent(v); }, [minOpponentInput]);

  const answerKey = useMemo(() => {
    return gameConsensus.map(game => {
      const ratios = game.currentRatios;
      const bt = BET_TYPES.find(b=>ratios[b]?.verboseLabel);
      if (!bt) return null;
      const {verboseLabel, count:csc, total:ctc} = ratios[bt];
      if (csc < minPicks) return null;
      if ((csc/ctc) <= 0.5) return null;

      const gameCappers = new Set(game.picks.map(p=>p.capper));
      const sp = game.sport;
      const sectionLabels = [`${sp} L${l30Days}`,`${sp} Cappers L${l30Days}`,`All L${l30Days}`,`All Cappers L${l30Days}`];
      const l30Data = [
        ratioHistoryL30[sp]?.[bt],
        filterCapperData(ratioHistoryL30[`${sp}_cappers`]?.[bt], gameCappers),
        ratioHistoryL30['All']?.[bt],
        filterCapperData(ratioHistoryL30['All_cappers']?.[bt], gameCappers),
      ];

      const rates = [];
      l30Data.forEach((data,si) => {
        if (!data) return;
        const entry=data[verboseLabel]; if (!entry) return;
        const total=entry.wins+entry.losses;
        if (total < minPicks) return;
        rates.push({pct:Math.round(entry.wins/total*100), wins:entry.wins, losses:entry.losses, section:sectionLabels[si]});
      });
      if (!rates.length) return null;

      const mostExtreme=rates.reduce((best,r)=>Math.abs(r.pct-50)>Math.abs(best.pct-50)?r:best, rates[0]);
      return {game:game.game, bt, verboseLabel, mostExtreme, consensusSideCount:csc, consensusTotalCappers:ctc};
    }).filter(Boolean).sort((a,b)=>Math.abs(b.mostExtreme.pct-50)-Math.abs(a.mostExtreme.pct-50));
  }, [gameConsensus, ratioHistoryL30, l30Days, minPicks]);

  const handleRefresh = useCallback(async () => {
    if (refreshCooldown || refreshState === 'loading') return;
    setRefreshState('loading');
    setRefreshMsg('');
    try {
      const res = await fetch('https://api.github.com/repos/sboghani1/line-movement/actions/workflows/process_discord_images.yml/dispatches', {
        method: 'POST',
        headers: {
          'Authorization': 'Bearer GITHUB_PAT_PLACEHOLDER',
          'Accept': 'application/vnd.github+json',
          'Content-Type': 'application/json',
        },
        body: JSON.stringify({ref: 'main'}),
      });
      if (res.status === 204) {
        setRefreshState('success');
        setRefreshMsg('✓ Workflow triggered');
      } else {
        const body = await res.text();
        setRefreshState('error');
        setRefreshMsg(`Error ${res.status}: ${body.slice(0,120)}`);
      }
    } catch(e) {
      setRefreshState('error');
      setRefreshMsg(`Failed: ${e.message}`);
    }
    setRefreshCooldown(true);
    refreshTimerRef.current = setTimeout(() => {
      setRefreshCooldown(false);
      setRefreshState(s => s !== 'error' ? 'idle' : s);
    }, 60000);
  }, [refreshCooldown, refreshState]);

  const totalFakes = useMemo(() => Object.values(fakeCappers).reduce((s,g)=>s+Object.values(g).reduce((ss,arr)=>ss+arr.length,0),0), [fakeCappers]);
  const totalDeleted = useMemo(() => Object.values(deletedPicks).reduce((s,set)=>s+set.size,0), [deletedPicks]);

  return (
    <div style={{minHeight:'100vh',background:'linear-gradient(135deg,#FA4616 0%,#d63a0f 40%,#0021A5 100%)',fontFamily:"'Segoe UI',system-ui,sans-serif",color:'#fff',padding:'20px'}}>
      <div style={{textAlign:'center',marginBottom:'30px',padding:'20px',background:'rgba(0,33,165,0.3)',borderRadius:'16px',border:'2px solid rgba(0,33,165,0.5)'}}>
        <h1 style={{fontSize:'2.5rem',fontWeight:'800',background:'linear-gradient(90deg,#fff,#0021A5,#fff)',WebkitBackgroundClip:'text',WebkitTextFillColor:'transparent',marginBottom:'8px'}}>🎯 FADE FINDER</h1>
        <p style={{color:'rgba(255,255,255,0.8)',fontSize:'0.9rem',marginBottom:'14px'}}>Capper Consensus Tracker • Donut clear data unless you asked the boss man!!</p>
        <div style={{display:'flex',flexDirection:'column',alignItems:'center',gap:'6px'}}>
          <div title={refreshCooldown ? 'no clicks for 60s' : ''} style={{display:'inline-block'}}>
            <button
              onClick={handleRefresh}
              disabled={refreshCooldown || refreshState==='loading'}
              style={{
                padding:'8px 24px',
                background: refreshCooldown ? 'rgba(255,255,255,0.07)' : 'linear-gradient(135deg,rgba(255,255,255,0.15),rgba(255,255,255,0.08))',
                border:'2px solid rgba(255,255,255,0.3)',
                borderRadius:'8px',
                color: refreshCooldown ? 'rgba(255,255,255,0.35)' : '#fff',
                fontSize:'0.85rem',fontWeight:'700',
                cursor: refreshCooldown ? 'not-allowed' : 'pointer',
                transition:'all 0.2s',
                opacity: refreshState==='loading' ? 0.7 : 1,
              }}>
              {refreshState==='loading' ? '⏳ Triggering…' : '🔄 Refresh Data'}
            </button>
          </div>
          {refreshMsg && <span style={{fontSize:'0.75rem',fontWeight:'600',color:refreshState==='success'?'#90EE90':'#FF6B6B'}}>{refreshMsg}</span>}
        </div>
      </div>

      <div style={{background:'rgba(0,33,165,0.25)',borderRadius:'12px',padding:'20px',marginBottom:'24px',border:'2px solid rgba(0,33,165,0.4)'}}>
        <div style={{display:'flex',gap:'16px',alignItems:'center',flexWrap:'wrap'}}>
          <label style={{display:'inline-block',padding:'12px 24px',background:'linear-gradient(135deg,#0021A5,#001a8c)',borderRadius:'8px',cursor:'pointer',fontWeight:'600',fontSize:'0.9rem',boxShadow:'0 4px 15px rgba(0,33,165,0.5)',border:'2px solid rgba(255,255,255,0.3)'}}>
            📁 Upload CSV (saves automatically)<input type="file" accept=".csv" onChange={handleFileUpload} style={{display:'none'}}/>
          </label>
          {picks.length>0 && <button onClick={clearStorage} style={{padding:'12px 24px',background:'rgba(255,100,100,0.2)',borderRadius:'8px',cursor:'pointer',fontWeight:'600',fontSize:'0.9rem',border:'2px solid rgba(255,100,100,0.5)',color:'#FF6B6B'}}>🗑️ Clear Data</button>}
          {(totalFakes>0||totalDeleted>0) && <button onClick={()=>{setFakeCappers({});setDeletedPicks({});}} style={{padding:'12px 24px',background:'rgba(255,200,0,0.1)',borderRadius:'8px',cursor:'pointer',fontWeight:'600',fontSize:'0.9rem',border:'2px solid rgba(255,200,0,0.4)',color:'rgba(255,200,0,0.9)'}}>↺ Reset all changes {totalFakes+totalDeleted > 0 ? `(${totalFakes} fake, ${totalDeleted} deleted)` : ''}</button>}
          {storageStatus==='loaded' && <span style={{color:'#90EE90',fontSize:'0.85rem'}}>💾 Loaded from storage</span>}
          {storageStatus==='saved'  && <span style={{color:'#90EE90',fontSize:'0.85rem'}}>✓ Saved to storage</span>}
          {lastLoaded && <span style={{color:'rgba(255,255,255,0.7)',fontSize:'0.85rem'}}>Last updated: {lastLoaded}</span>}
          {loadError  && <span style={{color:'#FF6B6B',fontSize:'0.85rem'}}>❌ {loadError}</span>}
        </div>
        {loading && <div style={{marginTop:'12px',color:'#FFD700',fontSize:'0.85rem'}}>⏳ Loading...</div>}
        {picks.length>0 && <div style={{marginTop:'12px',color:'#90EE90',fontSize:'0.85rem',fontWeight:'600'}}>✓ Loaded {picks.length} picks from {Object.keys(capperMap).length} cappers</div>}
        {storageStatus==='empty'&&picks.length===0&&!loading && <div style={{marginTop:'12px',color:'rgba(255,255,255,0.7)',fontSize:'0.85rem'}}>No data stored. Upload a CSV to get started.</div>}
      </div>

      {picks.length>0 && <div style={{background:'rgba(0,33,165,0.25)',borderRadius:'12px',padding:'20px',marginBottom:'24px',border:'2px solid rgba(0,33,165,0.4)'}}>
        <div style={{display:'flex',gap:'16px',marginBottom:'16px',flexWrap:'wrap',alignItems:'flex-end'}}>
          <div>
            <label style={{display:'block',marginBottom:'6px',color:'rgba(255,255,255,0.8)',fontSize:'0.8rem',fontWeight:'600'}}>SPORT</label>
            <select value={selectedSport} onChange={e=>setSelectedSport(e.target.value)} style={{padding:'10px 16px',background:'rgba(0,33,165,0.4)',border:'2px solid rgba(0,33,165,0.6)',borderRadius:'8px',color:'#fff',fontSize:'0.9rem',cursor:'pointer'}}>
              {sports.map(s=><option key={s} value={s} style={{background:'#0021A5'}}>{s}</option>)}
            </select>
          </div>
          <div>
            <label style={{display:'block',marginBottom:'6px',color:'rgba(255,255,255,0.8)',fontSize:'0.8rem',fontWeight:'600'}}>DATE</label>
            <select value={selectedDate||''} onChange={e=>setSelectedDate(e.target.value)} style={{padding:'10px 16px',background:'rgba(0,33,165,0.4)',border:'2px solid rgba(0,33,165,0.6)',borderRadius:'8px',color:'#fff',fontSize:'0.9rem',cursor:'pointer'}}>
              {dates.map(d=><option key={d} value={d} style={{background:'#0021A5'}}>{d}</option>)}
            </select>
          </div>
          <div>
            <label style={{display:'block',marginBottom:'6px',color:'rgba(255,255,255,0.8)',fontSize:'0.8rem',fontWeight:'600'}}>VERBOSE L (DAYS)</label>
            <input type="number" min="1" max="365" value={l30Input} onChange={e=>setL30Input(e.target.value)} onKeyDown={e=>{if(e.key==='Enter'){applyL30();applyMinPicks();applyMinOpponent();}}}
              style={{padding:'10px 8px',width:'70px',background:'rgba(0,33,165,0.4)',border:'2px solid rgba(0,33,165,0.6)',borderRadius:'8px',color:'#fff',fontSize:'0.9rem',textAlign:'center'}}/>
          </div>
          <div>
            <label style={{display:'block',marginBottom:'6px',color:'rgba(255,255,255,0.8)',fontSize:'0.8rem',fontWeight:'600'}}>MIN PICKS FOR CONSENSUS</label>
            <input type="number" min="1" max="50" value={minPicksInput} onChange={e=>setMinPicksInput(e.target.value)} onKeyDown={e=>{if(e.key==='Enter'){applyL30();applyMinPicks();applyMinOpponent();}}}
              style={{padding:'10px 8px',width:'70px',background:'rgba(0,33,165,0.4)',border:'2px solid rgba(0,33,165,0.6)',borderRadius:'8px',color:'#fff',fontSize:'0.9rem',textAlign:'center'}}/>
          </div>
          <div>
            <label style={{display:'block',marginBottom:'6px',color:'rgba(255,255,255,0.8)',fontSize:'0.8rem',fontWeight:'600'}}>MIN PICKS FOR MINORITY</label>
            <input type="number" min="0" max="50" value={minOpponentInput} onChange={e=>setMinOpponentInput(e.target.value)} onKeyDown={e=>{if(e.key==='Enter'){applyL30();applyMinPicks();applyMinOpponent();}}}
              style={{padding:'10px 8px',width:'70px',background:'rgba(0,33,165,0.4)',border:'2px solid rgba(0,33,165,0.6)',borderRadius:'8px',color:'#fff',fontSize:'0.9rem',textAlign:'center'}}/>
          </div>
          <div style={{display:'flex',alignItems:'flex-end'}}>
            <button onClick={()=>{applyL30();applyMinPicks();applyMinOpponent();}} style={{padding:'10px 16px',background:'linear-gradient(135deg,#0021A5,#001a8c)',border:'2px solid rgba(255,255,255,0.3)',borderRadius:'8px',color:'#fff',fontSize:'0.8rem',fontWeight:'700',cursor:'pointer'}}>↻ Apply</button>
          </div>
          <div style={{marginLeft:'auto'}}>
            <div style={{padding:'10px 20px',background:'rgba(0,33,165,0.4)',borderRadius:'8px',border:'2px solid rgba(0,33,165,0.6)',color:'#fff',fontWeight:'600'}}>{filteredPicks.length} picks • {gameConsensus.length} games</div>
          </div>
        </div>

        <div>
          <button onClick={()=>setCapperFilterOpen(o=>!o)} style={{display:'flex',alignItems:'center',gap:'8px',background:'none',border:'none',cursor:'pointer',padding:'2px 0',color:'rgba(255,255,255,0.8)',fontSize:'0.8rem',fontWeight:'600',marginBottom:capperFilterOpen?'10px':'0'}}>
            <span style={{fontSize:'0.6rem',display:'inline-block',transform:capperFilterOpen?'rotate(90deg)':'rotate(0deg)',transition:'transform 0.2s'}}>▶</span>
            FILTER BY CAPPER {selectedCappers.length>0&&<span style={{fontSize:'0.8rem',color:'#90EE90'}}>({selectedCappers.length} selected)</span>}
          </button>
          {capperFilterOpen && <>
            <div style={{display:'flex',alignItems:'center',gap:'12px',marginBottom:'10px'}}>
              <button onClick={()=>setSelectedCappers([...allCappers])} style={{padding:'4px 12px',background:'rgba(255,255,255,0.1)',border:'1px solid rgba(255,255,255,0.3)',borderRadius:'4px',color:'#fff',fontSize:'0.75rem',cursor:'pointer'}}>Select All</button>
              <button onClick={()=>setSelectedCappers([])} style={{padding:'4px 12px',background:'rgba(255,255,255,0.1)',border:'1px solid rgba(255,255,255,0.3)',borderRadius:'4px',color:'#fff',fontSize:'0.75rem',cursor:'pointer'}}>Clear</button>
            </div>
            <div style={{display:'flex',gap:'6px',flexWrap:'wrap'}}>
              {allCappers.map(capper => { const isSel=selectedCappers.includes(capper), color=capperMap[capper]?.color||'#888';
                return <button key={capper} onClick={()=>toggleCapper(capper)} style={{padding:'6px 12px',background:isSel?'#fff':'transparent',border:`3px solid ${color}`,borderRadius:'6px',color:isSel?'#000':'#fff',fontSize:'0.75rem',fontWeight:'600',cursor:'pointer',opacity:isSel?1:0.7,transition:'all 0.2s'}}>{capper}</button>;})}
            </div>
          </>}
        </div>
      </div>}

      {picks.length>0 && selectedCappers.length>0 && <div style={{background:'rgba(0,33,165,0.25)',borderRadius:'12px',padding:'20px',marginBottom:'24px',border:'2px solid rgba(0,33,165,0.4)'}}>
        <div style={{fontSize:'0.9rem',fontWeight:'600',marginBottom:'16px'}}>📋 SELECTED CAPPER PICKS ({selectedCappers.length} capper{selectedCappers.length>1?'s':''})</div>
        {[...selectedCappers].sort().map(capperName => {
          const capperPicks=filteredPicks.filter(p=>p.capper===capperName).sort((a,b)=>a.sport!==b.sport?a.sport.localeCompare(b.sport):a.game!==b.game?a.game.localeCompare(b.game):a.pick.localeCompare(b.pick));
          const color=capperMap[capperName]?.color||'#888', capRec=getCapperRecords[capperName];
          return (
            <div key={capperName} style={{marginBottom:'16px'}}>
              <div style={{display:'inline-block',padding:'6px 12px',background:'#fff',border:`4px solid ${color}`,borderRadius:'6px',fontWeight:'600',fontSize:'0.85rem',color:'#000',marginBottom:'8px'}}>{capperName} ({capperPicks.length} pick{capperPicks.length!==1?'s':''})</div>
              <div style={{display:'flex',flexWrap:'wrap',gap:'6px',marginLeft:'8px'}}>
                {capperPicks.map((pick,idx) => {
                  const bt=classifyPick(pick), sRec=capRec?.bySport[pick.sport]?.[bt]||null, aRec=capRec?.all[bt]||null;
                  return (
                    <div key={idx} style={{padding:'6px 10px',background:'#fff',border:`3px solid ${color}`,borderRadius:'6px',color:'#000',minWidth:'160px'}}>
                      <div style={{fontWeight:'700',fontSize:'0.75rem',marginBottom:'4px'}}>
                        <span style={{color:'#0021A5',marginRight:'4px'}}>{pick.sport}</span>{pick.pick}{pick.line&&<span style={{opacity:0.7}}> ({pick.line})</span>}
                      </div>
                      {bt && <div style={{fontSize:'0.6rem',color:'#333',lineHeight:'1.4'}}>
                        <div><span style={{fontWeight:'600',color:'#0021A5'}}>{pick.sport} {getBetTypeLabel(bt)}:</span> {formatRecord(sRec)} {sRec&&<span style={{fontFamily:'monospace',letterSpacing:'-1px'}}>{formatLast20(sRec)}</span>}</div>
                        <div><span style={{fontWeight:'600',color:'#666'}}>All {getBetTypeLabel(bt)}:</span> {formatRecord(aRec)} {aRec&&<span style={{fontFamily:'monospace',letterSpacing:'-1px'}}>{formatLast20(aRec)}</span>}</div>
                      </div>}
                    </div>
                  );
                })}
              </div>
            </div>
          );
        })}
      </div>}

      {picks.length>0 && answerKey.length>0 && <AnswerKey answerKey={answerKey} l30Days={l30Days} minPicks={minPicks} gameConsensus={gameConsensus} sectionSetters={sectionSetters}/>}

      {picks.length===0&&!loading
        ? <div style={{textAlign:'center',padding:'60px 20px',background:'rgba(0,33,165,0.25)',borderRadius:'16px',border:'2px dashed rgba(0,33,165,0.5)'}}>
            <div style={{fontSize:'4rem',marginBottom:'16px'}}>📊</div>
            <h2 style={{color:'#fff',fontWeight:'400',margin:'0 0 8px 0'}}>Upload a CSV to get started</h2>
          </div>
        : loading
          ? <div style={{textAlign:'center',padding:'60px 20px',background:'rgba(0,33,165,0.25)',borderRadius:'16px',border:'2px dashed rgba(0,33,165,0.5)'}}>
              <div style={{fontSize:'4rem',marginBottom:'16px'}}>⏳</div>
              <h2 style={{color:'#fff',fontWeight:'400'}}>Loading...</h2>
            </div>
          : <div style={{display:'flex',flexDirection:'column',gap:'16px'}}>
              {gameConsensus.map((game,idx) => (
                <div key={`${game.game}-${idx}`} id={`game-card-${idx}`}>
                  <GameCard
                    game={game}
                    ratioHistory={ratioHistory}
                    ratioHistoryL30={ratioHistoryL30}
                    l30Days={l30Days}
                    minPicks={minPicks}
                    sectionSetters={sectionSetters}
                    fakeCappers={fakeCappers}
                    deletedPicks={deletedPicks}
                    bucketRanges={bucketRanges}
                    setBucketRanges={setBucketRanges}
                    onAddFake={handleAddFake}
                    onRemoveFake={handleRemoveFake}
                    onDeletePick={handleDeletePick}
                    onRestorePick={handleRestorePick}
                    onResetGame={handleResetGame}
                  />
                </div>
              ))}
            </div>
      }

      {picks.length>0 && <div style={{marginTop:'32px',padding:'16px 20px',background:'rgba(0,33,165,0.25)',borderRadius:'12px',border:'2px solid rgba(0,33,165,0.4)',display:'flex',gap:'24px',flexWrap:'wrap',fontSize:'0.85rem'}}>
        {[['w','Win'],['l','Loss'],['_','Push']].map(([k,v]) => (
          <div key={k} style={{display:'flex',alignItems:'center',gap:'8px'}}>
            <span style={{fontFamily:'monospace',background:'rgba(255,255,255,0.2)',padding:'2px 6px',borderRadius:'4px'}}>{k}</span>
            <span style={{color:'rgba(255,255,255,0.9)'}}>= {v}</span>
          </div>
        ))}
        <div style={{display:'flex',alignItems:'center',gap:'8px'}}>
          <span style={{padding:'2px 8px',background:'linear-gradient(135deg,#0021A5,#001580)',borderRadius:'12px',fontSize:'0.7rem',fontWeight:'700',border:'2px solid #fff'}}>🎯 FADE ALERT</span>
          <span style={{color:'rgba(255,255,255,0.9)'}}>= 3+ cappers on one side</span>
        </div>
        <div style={{display:'flex',alignItems:'center',gap:'8px'}}>
          <span style={{padding:'2px 8px',border:'2px dashed rgba(255,200,0,0.6)',borderRadius:'4px',fontSize:'0.7rem',color:'rgba(255,200,0,0.8)',fontWeight:'700'}}>+ fake</span>
          <span style={{color:'rgba(255,255,255,0.9)'}}>= add hypothetical · ✕ remove · ↩ restore deleted</span>
        </div>
      </div>}
    </div>
  );
}


const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<CapperConsensusTracker />);
  </script>
</body>
</html>
